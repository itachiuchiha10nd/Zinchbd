<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flipbook 💌</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/blasten/turn.js/turn.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url("/Zinchbd/assets/flip-bg.jpg") center/cover no-repeat;
overflow:hidden;
font-family:sans-serif;
}

/* BACK BUTTON */
.back{
position:absolute;
top:20px;
left:20px;
padding:8px 16px;
background:#ff6eb4;
color:white;
border:none;
border-radius:20px;
cursor:pointer;
z-index:5;
}

/* CONTAINER */
.container{
width:90vw;
max-width:700px;
height:85vh;
display:flex;
justify-content:center;
align-items:center;
padding:15px;
}

/* BOOK */
#book{
width:100%;
height:100%;
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 0 25px rgba(0,0,0,0.5);
}

/* PAGE */
.page img{
width:100%;
height:100%;
object-fit:cover;
}

/* SWIPE TEXT */
.swipe-text{
position:absolute;
bottom:15px;
left:50%;
transform:translateX(-50%);
color:white;
font-size:16px;
font-weight:bold;
background:rgba(0,0,0,0.4);
padding:6px 12px;
border-radius:20px;
animation:fade 1.5s infinite alternate;
}

@keyframes fade{
from{opacity:0.6;}
to{opacity:1;}
}
</style>
</head>

<body>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" src="/Zinchbd/assets/bg.mp3" loop></audio>

<button class="back" onclick="goBack()">Back</button>

<div class="container">
<div id="book">

<div class="page"><img src="/Zinchbd/assets/page1.jpg"></div>
<div class="page"><img src="/Zinchbd/assets/page2.jpg"></div>
<div class="page"><img src="/Zinchbd/assets/page3.jpg"></div>
<div class="page"><img src="/Zinchbd/assets/page4.jpg"></div>

</div>
</div>

<div class="swipe-text">Swipe the page for view 👉</div>

<script>

/* 🎵 PERFECT MUSIC SYSTEM */
let bg = document.getElementById("bgMusic");

window.addEventListener("load",()=>{

// restore time
let t = localStorage.getItem("bgTime") || 0;
bg.currentTime = t;

// try autoplay
bg.play().then(()=>{
console.log("Music autoplay success");
}).catch(()=>{
console.log("Autoplay blocked, waiting click");

// mobile fix
document.body.addEventListener("click",()=>{
bg.play();
},{once:true});

});

// save time continuously
setInterval(()=>{
localStorage.setItem("bgTime", bg.currentTime);
},1000);

});

/* 🔙 BACK */
function goBack(){
window.location.href="video.html";
}

/* 📖 BOOK */
$("#book").turn({
width:"100%",
height:"100%",
autoCenter:true,
gradients:true
});

/* 📱 SWIPE */
let startX=0;

document.getElementById("book").addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
});

document.getElementById("book").addEventListener("touchend",e=>{
let endX=e.changedTouches[0].clientX;

if(startX-endX>50){
$("#book").turn("next");
playFlipSound();
}
if(endX-startX>50){
$("#book").turn("previous");
playFlipSound();
}
});

/* 🔊 SOUND */
function playFlipSound(){
let s = new Audio("/Zinchbd/assets/flip.mp3");
s.volume = 0.5;
s.play();
}

</script>

</body>
</html>
