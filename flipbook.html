<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flipbook 💌</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/blasten/turn.js/turn.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url("assets/flip-bg.jpg") center/cover no-repeat;
overflow:hidden;
}

/* 🔙 BACK BUTTON */
.back{
position:absolute;
top:20px;
left:20px;
padding:8px 16px;
background:#ff6eb4;
color:#fff;
border:none;
border-radius:20px;
font-weight:bold;
cursor:pointer;
}

/* 📦 OUTER BOX (CENTER SAFE AREA) */
.container{
width:90vw;
max-width:700px;
height:85vh;

display:flex;
justify-content:center;
align-items:center;

padding:15px; /* 🔥 margin from screen */
}

/* 📖 BOOK */
#book{
width:100%;
height:100%;
box-shadow:0 0 25px rgba(0,0,0,0.5);
border-radius:12px;
overflow:hidden;
background:white;
}

/* PAGE */
.page{
background:white;
}

/* IMAGE */
.page img{
width:100%;
height:100%;
object-fit:cover;
}
</style>
</head>

<body>

<!-- 🎵 BG MUSIC -->
<audio id="bgMusic" src="/Zinchbd/assets/bg.mp3" loop></audio>

<button class="back" onclick="goBack()">Back</button>

<!-- 📦 CENTER BOX -->
<div class="container">

<div id="book">

<div class="page"><img src="assets/page1.jpg"></div>
<div class="page"><img src="assets/page2.jpg"></div>
<div class="page"><img src="assets/page3.jpg"></div>
<div class="page"><img src="assets/page4.jpg"></div>

</div>

</div>

<script>

/* 🎵 MUSIC SYSTEM */
let bg;

window.addEventListener("load",()=>{
bg = document.getElementById("bgMusic");

let t = localStorage.getItem("bgTime") || 0;
bg.currentTime = t;

bg.pause(); // 🔥 flipbook open → pause
});

/* 🔙 BACK */
function goBack(){
let t = localStorage.getItem("bgTime") || 0;
bg.currentTime = t;

bg.play().catch(()=>{});

window.location.href="video.html";
}

/* 📖 INIT BOOK */
$("#book").turn({
width:"100%",
height:"100%",
autoCenter:true,
gradients:true
});

/* 👆 SWIPE SUPPORT */
let startX=0;

document.getElementById("book").addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
});

document.getElementById("book").addEventListener("touchend",e=>{
let endX=e.changedTouches[0].clientX;

if(startX-endX>50){
$("#book").turn("next");
}
if(endX-startX>50){
$("#book").turn("previous");
}
});

</script>

</body>
</html>
