<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flipbook 💌</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/blasten/turn.js/turn.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url("assets/flip-bg.jpg") center/cover no-repeat;
overflow:hidden;
font-family:sans-serif;
}

/* BACK BUTTON */
.back{
position:absolute;
top:20px;
left:20px;
padding:8px 16px;
background:#ff6eb4;
color:white;
border:none;
border-radius:20px;
cursor:pointer;
z-index:5;
}

/* CONTAINER */
.container{
width:90vw;
max-width:700px;
height:85vh;
display:flex;
justify-content:center;
align-items:center;
}

/* BOOK */
#book{
width:100%;
height:100%;
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 0 25px rgba(0,0,0,0.5);
}

/* PAGE */
.page img{
width:100%;
height:100%;
object-fit:cover;
}

/* SWIPE TEXT */
.swipe-text{
position:absolute;
bottom:15px;
left:50%;
transform:translateX(-50%);
color:white;
font-size:16px;
font-weight:bold;
background:rgba(0,0,0,0.4);
padding:6px 12px;
border-radius:20px;
animation:fade 1.5s infinite alternate;
}

@keyframes fade{
from{opacity:0.6;}
to{opacity:1;}
}
</style>
</head>

<body>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" src="assets/bg.mp3" loop></audio>

<button class="back" onclick="goBack()">Back</button>

<div class="container">
<div id="book">

<div class="page"><img src="assets/page1.png"></div>
<div class="page"><img src="assets/page2.png"></div>
<div class="page"><img src="assets/page3.png"></div>

</div>
</div>

<div class="swipe-text">Swipe the page for view 👉</div>

<script>

/* 🎵 MUSIC SYSTEM */
let bg = document.getElementById("bgMusic");

window.addEventListener("load",()=>{

let t = localStorage.getItem("bgTime") || 0;
bg.currentTime = t;

// autoplay try
bg.play().catch(()=>{
document.body.addEventListener("click", ()=>{
bg.play();
},{once:true});
});

// save time
setInterval(()=>{
localStorage.setItem("bgTime", bg.currentTime);
},1000);

});

/* BACK */
function goBack(){
window.location.href="video.html";
}

/* FLIPBOOK */
$("#book").turn({
width:"100%",
height:"100%",
autoCenter:true,
gradients:true
});

/* 📱 TOUCH SWIPE */
let startX = 0;
let endX = 0;
const book = document.getElementById("book");

book.addEventListener("touchstart", (e)=>{
startX = e.touches[0].clientX;
});

book.addEventListener("touchmove", (e)=>{
endX = e.touches[0].clientX;
});

book.addEventListener("touchend", ()=>{
let diff = startX - endX;

if(diff > 50){
$("#book").turn("next");
playFlipSound();
}

if(diff < -50){
$("#book").turn("previous");
playFlipSound();
}
});

/* 🖱️ MOUSE SWIPE */
let mouseStart = 0;

book.addEventListener("mousedown", e=>{
mouseStart = e.clientX;
});

book.addEventListener("mouseup", e=>{
let diff = mouseStart - e.clientX;

if(diff > 50){
$("#book").turn("next");
playFlipSound();
}
if(diff < -50){
$("#book").turn("previous");
playFlipSound();
}
});

/* 🔊 SOUND */
function playFlipSound(){
let s = new Audio("assets/flip.mp3");
s.volume = 0.5;
s.play();
}

</script>

</body>
</html>
