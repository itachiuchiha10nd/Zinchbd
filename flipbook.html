<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flipbook 💌</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/blasten/turn.js/turn.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url("assets/flip-bg.jpg") center/cover no-repeat;
overflow:hidden;
font-family:sans-serif;
}

/* ✨ PARTICLES */
.particle{
position:fixed;
font-size:18px;
animation:fall linear infinite;
}
@keyframes fall{
0%{transform:translateY(-10vh);}
100%{transform:translateY(110vh);}
}

/* 📖 BOOK */
#book{
width:92vw;
max-width:650px;
height:82vh;
box-shadow:0 0 40px rgba(255,105,180,0.4);
border-radius:12px;
}

/* PAGE */
.page{
background:white;
position:relative;
box-shadow:0 0 25px rgba(0,0,0,0.5);
}

/* IMAGE */
.page img{
width:100%;
height:100%;
object-fit:cover;
}

/* PAGE NUMBER */
.page::after{
content:attr(data-page);
position:absolute;
bottom:10px;
right:15px;
font-size:14px;
color:#555;
}

/* BACK BUTTON */
.back{
position:absolute;
top:20px;
left:20px;
padding:8px 16px;
background:#ff6eb4;
color:#fff;
border:none;
border-radius:20px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<button class="back" onclick="goBack()">Back</button>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" src="assets/bg.mp3" loop></audio>
<audio id="flipSound" src="assets/flip.mp3"></audio>

<!-- 📖 BOOK -->
<div id="book">

<div class="page" data-page="1"><img src="assets/page1.jpg"></div>
<div class="page" data-page="2"><img src="assets/page2.jpg"></div>
<div class="page" data-page="3"><img src="assets/page3.jpg"></div>
<div class="page" data-page="4"><img src="assets/page4.jpg"></div>

</div>

<script>

/* 🎵 MUSIC SYSTEM */
const bg = document.getElementById("bgMusic");

window.onload = ()=>{
let t = localStorage.getItem("bgTime") || 0;
bg.currentTime = t;
bg.pause(); // 🔥 flipbook open → music pause
};

/* 🔙 BACK */
function goBack(){
window.location.href="video.html";
}

/* 📖 INIT BOOK */
$("#book").turn({
width:"100%",
height:"100%",
autoCenter:true,
gradients:true,
duration:800
});

/* 🔊 FLIP SOUND */
$("#book").bind("turning", ()=>{
document.getElementById("flipSound").play();
});

/* 👆 SWIPE SUPPORT */
let startX=0;

let book=document.getElementById("book");

book.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
});

book.addEventListener("touchend",e=>{
let endX=e.changedTouches[0].clientX;

if(startX-endX>50){
$("#book").turn("next");
}
if(endX-startX>50){
$("#book").turn("previous");
}
});

/* ✨ PARTICLES */
setInterval(()=>{
let p=document.createElement("div");
p.className="particle";
p.innerHTML="💖";
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(3+Math.random()*3)+"s";
document.body.appendChild(p);

setTimeout(()=>p.remove(),6000);
},300);

</script>

</body>
</html>
