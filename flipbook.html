<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flipbook 💌</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/blasten/turn.js/turn.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

/* 🔥 PNG BACKGROUND */
background:url("assets/flip-bg.jpg") center/cover no-repeat;

font-family:sans-serif;
overflow:hidden;
}

/* BACK BUTTON */
.back{
position:absolute;
top:20px;
left:20px;
padding:8px 16px;
background:#ff6eb4;
border:none;
border-radius:20px;
color:white;
font-weight:bold;
cursor:pointer;
}

/* 📖 BOOK */
#book{
width:90vw;
max-width:400px;
height:80vh;
max-height:550px;

box-shadow:0 0 30px rgba(255,105,180,0.6);
border-radius:12px;
overflow:hidden;
}

/* PAGE */
.page{
width:100%;
height:100%;
background:white;
display:flex;
justify-content:center;
align-items:center;
}

/* IMAGE */
.page img{
width:100%;
height:100%;
object-fit:cover;
}
</style>
</head>

<body>

<button class="back" onclick="window.location.href='video.html?page=3'">Back</button>

<div id="book">

<div class="page"><img src="assets/page1.jpg"></div>
<div class="page"><img src="assets/page2.jpg"></div>
<div class="page"><img src="assets/page3.jpg"></div>
<div class="page"><img src="assets/page4.jpg"></div>

</div>

<script>
$("#book").turn({
width: $("#book").width(),
height: $("#book").height(),
autoCenter:true,
gradients:true
});
</script>

</body>
</html>
