<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Special Video 💖</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url("assets/bg.jpg") center/cover no-repeat;
font-family:sans-serif;
}

/* BACK BUTTON */
.back{
position:absolute;
top:20px;
left:20px;
padding:8px 16px;
background:#ff6eb4;
border:none;
border-radius:20px;
color:white;
font-weight:bold;
cursor:pointer;
}

/* VIDEO BOX (9:16) */
.video-box{
width:80vw;
max-width:360px;
aspect-ratio:9/16;

border-radius:20px;
overflow:hidden;

display:flex;
justify-content:center;
align-items:center;

background:black;
box-shadow:0 0 25px rgba(255,105,180,0.8);
}

/* VIDEO */
video{
width:100%;
height:100%;
object-fit:contain;
}
</style>
</head>

<body>

<!-- 🎵 BACKGROUND MUSIC -->
<audio id="bgMusic" src="assets/bg.mp3" loop></audio>

<button class="back" onclick="goBack()">Back</button>

<div class="video-box">
<video id="vid" src="assets/video.mp4" autoplay playsinline loop muted></video>
</div>

<script>

/* 🎵 BG MUSIC SYSTEM */
const bg = document.getElementById("bgMusic");

/* PAGE LOAD → PAUSE BG */
window.onload = ()=>{
let t = localStorage.getItem("bgTime") || 0;
bg.currentTime = t;
bg.pause(); // 🔥 video open → pause music
};

/* BACK → RESUME MUSIC */
function goBack(){
let t = localStorage.getItem("bgTime") || 0;
bg.currentTime = t;
bg.play().catch(()=>{});

window.location.href="video.html?page=3";
}

/* 🎥 VIDEO AUTOPLAY FIX */
const v = document.getElementById("vid");

/* try autoplay */
v.muted = true;
v.play().then(()=>{
// after start → unmute if user interacts
document.body.addEventListener("click", ()=>{
v.muted = false;
});
}).catch(()=>{

/* mobile fallback */
document.body.addEventListener("click", ()=>{
v.muted = false;
v.play();
});

});

</script>

</body>
</html>
