<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Special Video 💖</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url("/Zinchbd/assets/bg.jpg") center/cover no-repeat;
font-family:sans-serif;
overflow:hidden;
}

/* BACK BUTTON */
.back{
position:absolute;
top:20px;
left:20px;
padding:8px 16px;
background:#ff6eb4;
border:none;
border-radius:20px;
color:white;
font-weight:bold;
cursor:pointer;
z-index:5;
}

/* VIDEO BOX */
.video-box{
width:80vw;
max-width:360px;
aspect-ratio:9/16;

border-radius:20px;
overflow:hidden;

display:flex;
justify-content:center;
align-items:center;

background:black;
box-shadow:0 0 25px rgba(255,105,180,0.8);
}

/* VIDEO */
video{
width:100%;
height:100%;
object-fit:contain;
}

/* TOUCH SCREEN */
.start-screen{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.9);
color:white;
font-size:22px;
font-weight:bold;
z-index:10;
text-align:center;
padding:20px;
animation:fadeIn .5s ease;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}
</style>
</head>

<body>

<!-- 🎵 BG MUSIC -->
<audio id="bgMusic" src="/Zinchbd/assets/bg.mp3" loop></audio>

<button class="back" onclick="goBack()">Back</button>

<!-- TOUCH SCREEN -->
<div id="startScreen" class="start-screen">
Touch to Play 💖
</div>

<!-- VIDEO -->
<div class="video-box">
<video id="vid" src="/Zinchbd/assets/video.mp4" loop preload="auto"></video>
</div>

<script>

/* 🎵 MUSIC SYSTEM */
let bg;

window.addEventListener("load",()=>{
bg = document.getElementById("bgMusic");

let t = localStorage.getItem("bgTime") || 0;
bg.currentTime = t;

bg.pause(); // video page → pause bg music
});

/* 🔙 BACK FUNCTION */
function goBack(){
let t = localStorage.getItem("bgTime") || 0;
bg.currentTime = t;

bg.play().then(()=>{
window.location.href="video.html";
});
}

/* 🎬 VIDEO CONTROL */
const v = document.getElementById("vid");
const screen = document.getElementById("startScreen");

/* iPhone FIX */
v.setAttribute("playsinline", "");
v.setAttribute("webkit-playsinline", "");

/* TOUCH TO PLAY */
screen.addEventListener("click", ()=>{

if(screen.style.display === "none") return;

v.muted = false;
v.volume = 1;
v.currentTime = 0;
v.play();

screen.style.display = "none";

});

</script>

</body>
</html>
