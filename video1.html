<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Special Video 💖</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url("assets/bg.jpg") center/cover no-repeat;
font-family:sans-serif;
}

/* BACK BUTTON */
.back{
position:absolute;
top:20px;
left:20px;
padding:8px 16px;
background:#ff6eb4;
border:none;
border-radius:20px;
color:white;
font-weight:bold;
cursor:pointer;
}

/* 🔥 VERTICAL VIDEO BOX (9:16) */
.video-box{
width:80vw;             /* responsive */
max-width:360px;        /* mobile perfect */
aspect-ratio:9/16;      /* 🔥 720x1280 ratio */

border-radius:20px;
overflow:hidden;

display:flex;
justify-content:center;
align-items:center;

background:black;
box-shadow:0 0 25px rgba(255,105,180,0.8);
}

/* 🎥 VIDEO (NO CUT) */
video{
width:100%;
height:100%;
object-fit:contain;   /* पूरा video दिखे */
}
</style>
</head>

<body>

<button class="back" onclick="window.location.href='video.html'">Back</button>

<div class="video-box">
<video id="vid" src="assets/video.mp4" autoplay playsinline loop></video>
</div>

<script>

const v = document.getElementById("vid");

/* TRY AUTOPLAY WITH SOUND */
v.muted = false;
v.play().catch(()=>{

/* fallback for mobile */
document.body.addEventListener("click", ()=>{
v.muted = false;
v.play();
});

});

</script>

</body>
</html>
