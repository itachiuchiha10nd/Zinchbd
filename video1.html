<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Special Video 💖</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url("assets/bg.jpg") center/cover no-repeat;
font-family:sans-serif;
}

/* BACK BUTTON */
.back{
position:absolute;
top:20px;
left:20px;
padding:8px 16px;
background:#ff6eb4;
border:none;
border-radius:20px;
color:white;
font-weight:bold;
cursor:pointer;
}

/* VIDEO BOX */
.video-box{
width:80vw;
max-width:360px;
aspect-ratio:9/16;

border-radius:20px;
overflow:hidden;

display:flex;
justify-content:center;
align-items:center;

background:black;
box-shadow:0 0 25px rgba(255,105,180,0.8);
}

/* VIDEO */
video{
width:100%;
height:100%;
object-fit:contain;
}
</style>
</head>

<body>

<!-- 🎵 BG MUSIC (ADDED) -->
<audio id="bgMusic" src="/Zinchbd/assets/bg.mp3" loop></audio>

<button class="back" onclick="goBack()">Back</button>

<div class="video-box">
<video id="vid" src="assets/video.mp4" autoplay playsinline loop muted></video>
</div>

<script>

/* 🎵 MUSIC SYSTEM (ADDED ONLY) */
let bg;

window.addEventListener("load",()=>{
bg = document.getElementById("bgMusic");

let t = localStorage.getItem("bgTime") || 0;
bg.currentTime = t;

bg.pause(); // 🔥 video page → pause
});

/* BACK → RESUME */
function goBack(){
let t = localStorage.getItem("bgTime") || 0;
bg.currentTime = t;

bg.play().catch(()=>{});

window.location.href="video.html";
}

/* 🎥 VIDEO AUTOPLAY FIX */
const v = document.getElementById("vid");

v.muted = true;
v.play().then(()=>{
document.body.addEventListener("click", ()=>{
v.muted = false;
});
}).catch(()=>{
document.body.addEventListener("click", ()=>{
v.muted = false;
v.play();
});
});

</script>

</body>
</html>
