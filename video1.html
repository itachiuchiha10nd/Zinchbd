<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Special Video 💖</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url("assets/bg.jpg") center/cover no-repeat;
font-family:sans-serif;
}

/* BACK BUTTON */
.back{
position:absolute;
top:20px;
left:20px;
padding:8px 16px;
background:#ff6eb4;
border:none;
border-radius:20px;
color:white;
font-weight:bold;
cursor:pointer;
}

/* 🔥 VIDEO BOX (CENTER 2x2 STYLE) */
.video-box{
width:70vw;              /* responsive */
max-width:420px;         /* big but clean */
aspect-ratio:1/1;        /* square look (2x2 feel) */
border-radius:20px;
overflow:hidden;

display:flex;
justify-content:center;
align-items:center;

box-shadow:0 0 25px rgba(255,105,180,0.8);
}

/* VIDEO */
video{
width:100%;
height:100%;
object-fit:cover;
}
</style>
</head>

<body>

<button class="back" onclick="window.location.href='video.html'">Back</button>

<div class="video-box">
<video id="vid" src="assets/video.mp4" autoplay playsinline></video>
</div>

<script>

/* 🔥 FORCE SOUND AFTER LOAD */
const v = document.getElementById("vid");

/* try autoplay with sound */
v.muted = false;
v.play().catch(()=>{
/* fallback: user interaction */
document.body.addEventListener("click", ()=>{
v.muted = false;
v.play();
});
});

</script>

</body>
</html>
