<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Surprise 💗</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;font-family:sans-serif;}

/* PAGE */
.page{
position:fixed;inset:0;
display:flex;flex-direction:column;
justify-content:center;align-items:center;
opacity:0;pointer-events:none;
}
.page.active{opacity:1;pointer-events:auto;}

/* BG */
.bg{
position:absolute;inset:0;
background:url("assets/bg.jpg") center/cover no-repeat;
z-index:-1;
}

/* GIF BOX */
.box{
width:220px;
height:140px;
border-radius:10px;
overflow:hidden;
margin-bottom:15px;
}
.box img{
width:100%;
height:100%;
object-fit:contain;
}

/* BUTTON */
.btn{
padding:8px 16px;
margin:6px;
border:none;
border-radius:20px;
background:#ff6eb4;
color:white;
font-weight:bold;
}

/* GIFTS */
.gifts{
display:grid;
grid-template-columns:repeat(2,110px);
gap:15px;
justify-content:center;
}

.gift img{
width:110px;
height:110px;
cursor:pointer;
}

/* LETTER */
.letter{
position:relative;
width:280px;height:380px;
}
.letter img{width:100%;height:100%;}
.text{
position:absolute;
top:15%;
left:50%;
transform:translateX(-50%);
width:80%;height:70%;
display:flex;align-items:center;justify-content:center;
text-align:center;
font-family:'Dancing Script';
font-weight:bold;
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="page active" id="p1">
<div class="bg"></div>

<div class="box">
<img src="assets/gif1.gif">
</div>

<button class="btn" onclick="go(3)">Yes 💖</button>
<button class="btn" onclick="go(2)">No 😒</button>
</div>

<!-- PAGE 2 -->
<div class="page" id="p2">
<div class="bg"></div>

<div class="box">
<img src="assets/gif2.gif">
</div>

<button class="btn" onclick="go(1)">Back</button>
</div>

<!-- GIFTS -->
<div class="page" id="p3">
<div class="bg"></div>

<div class="gifts">
<img src="assets/gift.png" onclick="openGift(1)">
<img src="assets/gift.png" onclick="openGift(2)">
<img src="assets/gift.png" onclick="openGift(3)">
<img src="assets/gift.png" onclick="openGift(4)">
</div>

<button class="btn" onclick="go(1)">Back</button>
<button id="finalBtn" class="btn" style="display:none;" onclick="go(8)">Final Words</button>
</div>

<!-- FINAL -->
<div class="page" id="p8">
<div class="bg"></div>

<div class="letter">
<img src="assets/paper1.png">
<div class="text">Happy Birthday Zinc 💖</div>
</div>

<button class="btn" onclick="go(3)">Back</button>
</div>

<script>

function go(n){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById("p"+n).classList.add("active");
}

let opened={};

function openGift(id){

if(id===1){
window.location.href="flipbook.html";
return;
}

if(id===2){
window.location.href="video2.html";
return;
}

opened[id]=true;

if(Object.keys(opened).length===4){
document.getElementById("finalBtn").style.display="block";
}
}

</script>

</body>
</html>
