<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Surprise 💗</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;background:#000;font-family:sans-serif;}

/* PAGE */
.page{
position:fixed;inset:0;
display:flex;flex-direction:column;
justify-content:center;align-items:center;
opacity:0;pointer-events:none;
}
.page.active{opacity:1;pointer-events:auto;}

/* BG */
.bg{
position:absolute;inset:0;
background:url("assets/bg.jpg") center/cover no-repeat;
z-index:-1;
}

/* FINAL BG */
#p8 .bg{
background:url("assets/final-bg.jpg") center/cover no-repeat;
}

/* GIF BOX */
.box{
width:240px;height:150px;
display:flex;justify-content:center;align-items:center;
overflow:hidden;margin-bottom:15px;
}
.box img{
max-width:100%;max-height:100%;object-fit:contain;
}

/* BUTTON */
.btn{
padding:10px 18px;
margin:6px;
border:none;
border-radius:20px;
background:#ff6eb4;
color:white;
font-weight:bold;
cursor:pointer;
}

/* GIFS */
.gifts{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:25px;
max-width:340px;
}

/* 🔥 FINAL TEXT FIX */
.final-text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);

width:85%;
height:70%;

overflow-y:auto;

text-align:center;

font-family:'Dancing Script', cursive;
color:#000;

font-size:30px;
line-height:1.6;
}

/* hide scrollbar */
.final-text::-webkit-scrollbar{display:none;}
</style>
</head>

<body>

<audio id="song" src="assets/bg.mp3" loop></audio>

<!-- PAGE 1 -->
<div class="page active" id="p1">
<div class="bg"></div>
<div class="box"><img src="assets/gif1.gif"></div>
<button class="btn" onclick="goCake()">Back</button>
<button class="btn" onclick="go(3)">Yes 💖</button>
<button class="btn" onclick="go(2)">No 😒</button>
</div>

<!-- PAGE 2 -->
<div class="page" id="p2">
<div class="bg"></div>
<div class="box"><img src="assets/gif2.gif"></div>
<button class="btn" onclick="go(1)">Back</button>
</div>

<!-- GIFTS -->
<div class="page" id="p3">
<div class="bg"></div>

<div class="gifts">
<div class="gift" onclick="openGift(1)"><img src="assets/gift.png"></div>
<div class="gift" onclick="openGift(2)"><img src="assets/gift.png"></div>
<div class="gift" onclick="openGift(3)"><img src="assets/gift.png"></div>
<div class="gift" onclick="openGift(4)"><img src="assets/gift.png"></div>
</div>

<button class="btn" onclick="go(1)">Back</button>
<button id="finalBtn" class="btn" style="display:none;" onclick="go(8)">Final Words 💌</button>
</div>

<!-- FINAL PAGE -->
<div class="page" id="p8">
<div class="bg"></div>

<div class="final-text" id="typing"></div>

<button class="btn" onclick="go(3)">Back</button>
<button class="btn" onclick="openTelegram()">❤️🧿🎀</button>

</div>

<script>

/* MUSIC */
let song=document.getElementById("song");

function pauseMusic(){
localStorage.setItem("time",song.currentTime);
song.pause();
}

function resumeMusic(){
let t=localStorage.getItem("time");
if(t){song.currentTime=t;}
song.play().catch(()=>{});
}

/* NAV */
function go(n){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById("p"+n).classList.add("active");

resumeMusic();

if(n===8) startTyping();
}

/* BACK */
function goCake(){
window.location.href="index.html#p3";
}

/* GIF TRACK */
let opened = JSON.parse(localStorage.getItem("gifts")) || {};

function openGift(id){
opened[id]=true;
localStorage.setItem("gifts", JSON.stringify(opened));

if(id===1){pauseMusic();window.location.href="flipbook.html";return;}
if(id===2){pauseMusic();window.location.href="video1.html";return;}
if(id===3){pauseMusic();window.location.href="cardbook.html";return;}
if(id===4){pauseMusic();window.location.href="video4.html";return;}

checkFinal();
}

function checkFinal(){
let data = JSON.parse(localStorage.getItem("gifts")) || {};
if(Object.keys(data).length===4){
document.getElementById("finalBtn").style.display="block";
}
}

/* 🔥 FULL WISHES */
const msg = `Happy Birthday, Zinc ❤️

I know all of this might feel a little cringe… maybe even childish. But honestly, I still wanted to do it.
Because sometimes, the simplest and most genuine things come from the heart, even if they’re not perfect.
I also know that I’m not like your other friends. Maybe they’re better than me in many ways.
But I truly believe that money can’t buy happiness.
What really matters is the effort, the intention, and the feelings behind it.
I just wanted to say this much — I hope you like this little surprise.
I really want us to always remain friends, Zinc.
There’s actually something I wanted to say… but I’ll leave it for now.
So for now, that’s it.

Once again, Happy Birthday, Zinc ❤️`;

/* TYPING */
function startTyping(){
let el=document.getElementById("typing");
el.innerHTML="";
let i=0;

function type(){
if(i<msg.length){
el.innerHTML+=msg[i++];
setTimeout(type,8);
}
}
type();
}

/* TELEGRAM */
function openTelegram(){
window.open("https://t.me/niconiconicotine","_blank");
}

/* LOAD */
window.onload=function(){
resumeMusic();
checkFinal();
}

</script>

</body>
</html>
