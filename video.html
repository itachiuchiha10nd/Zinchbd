<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Surprise 💗</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;background:#000;font-family:sans-serif;}

/* PAGE */
.page{
position:fixed;inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
}
.page.active{opacity:1;pointer-events:auto;}

/* BG */
.bg{
position:absolute;
inset:0;
background:url("assets/bg.jpg") center/cover no-repeat;
z-index:-1;
}

/* FINAL BG */
#p8 .bg{
background:url("assets/final-bg.jpg") center/cover no-repeat;
}

/* BUTTON */
.btn{
padding:10px 18px;
margin:6px;
border:none;
border-radius:20px;
background:#ff6eb4;
color:white;
font-weight:bold;
cursor:pointer;
}

/* 🎁 PERFECT GRID (CENTER, NOT PINK BOX) */
.gifts{
display:grid;
grid-template-columns:repeat(2,130px);
grid-template-rows:repeat(2,130px);
gap:20px;
justify-content:center;
align-content:center;
}

.gift{
display:flex;
justify-content:center;
align-items:center;
}

.gift img{
width:110px;
height:110px;
object-fit:contain;
cursor:pointer;
transition:0.2s;
}

.gift img:active{
transform:scale(0.9);
}

/* 💌 TEXT EXACT PINK PAPER AREA */
.text-box{
position:absolute;

/* 🔥 EXACTLY tuned to your image */
top:47%;
left:50%;
transform:translate(-50%,-50%);

/* 📏 pink paper size */
width:74%;
max-width:360px;
aspect-ratio:2/1;

/* spacing inside paper */
padding:18px 16px;

display:flex;
justify-content:center;
align-items:center;

overflow:hidden;
}

/* TEXT */
.final-text{
width:100%;
height:100%;

display:flex;
justify-content:center;
align-items:center;
text-align:center;

font-family:'Dancing Script', cursive;
color:#000;

line-height:1.5;
}

/* BUTTON GROUP */
.btn-group{
position:absolute;
bottom:25px;
display:flex;
gap:10px;
}
</style>
</head>

<body>

<audio id="song" src="assets/bg.mp3" loop></audio>

<!-- PAGE 1 -->
<div class="page active" id="p1">
<div class="bg"></div>
<button class="btn" onclick="go(3)">Start 💖</button>
</div>

<!-- GIFTS PAGE -->
<div class="page" id="p3">
<div class="bg"></div>

<div class="gifts">
<div class="gift" onclick="openGift(1)"><img src="assets/gift.png"></div>
<div class="gift" onclick="openGift(2)"><img src="assets/gift.png"></div>
<div class="gift" onclick="openGift(3)"><img src="assets/gift.png"></div>
<div class="gift" onclick="openGift(4)"><img src="assets/gift.png"></div>
</div>

<button id="finalBtn" class="btn" style="display:none;" onclick="go(8)">Final 💌</button>
</div>

<!-- FINAL PAGE -->
<div class="page" id="p8">
<div class="bg"></div>

<div class="text-box">
<div class="final-text" id="typing"></div>
</div>

<div class="btn-group">
<button class="btn" onclick="go(3)">Back</button>
<button class="btn" onclick="openTelegram()">❤️🧿🎀</button>
</div>

</div>

<script>

/* MUSIC */
let song=document.getElementById("song");

function resumeMusic(){
song.play().catch(()=>{});
}

/* NAV */
function go(n){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById("p"+n).classList.add("active");

resumeMusic();

if(n===8) startTyping();
}

/* GIF TRACK */
let opened={};

function openGift(id){
opened[id]=true;

if(id===1) location.href="flipbook.html";
if(id===2) location.href="video1.html";
if(id===3) location.href="cardbook.html";
if(id===4) location.href="video4.html";

if(Object.keys(opened).length===4){
document.getElementById("finalBtn").style.display="block";
}
}

/* 💌 FULL ORIGINAL WISH (NO CUT) */
const msg = `Happy Birthday, Zinc ❤️

I know all of this might feel a little cringe… maybe even childish. But honestly, I still wanted to do it. Because sometimes, the simplest and most genuine things come from the heart, even if they’re not perfect.

I also know that I’m not like your other friends. Maybe they’re better than me in many ways. Maybe they’re giving you expensive gifts, planning big surprises, or doing things that I can’t. And yeah… I’ve thought about that too.

But I truly believe that money can’t buy happiness. What really matters is the effort, the intention, and the feelings behind it. And whatever this is… it comes from a real place.

I just wanted to say this much — I hope you like this little surprise. I hope it makes you smile, even if just for a moment. And more than anything, I hope you always stay happy.

I really want us to always remain friends, Zinc. That matters to me more than I can properly explain.

There’s actually something I wanted to say… but I’ll leave it for now. I don’t want to risk ruining your day.

So for now, that’s it.

Once again, Happy Birthday, Zinc ❤️`;

/* AUTO FIT PERFECT */
function startTyping(){
let el=document.getElementById("typing");
el.innerHTML="";
let i=0;

function type(){
if(i<msg.length){
el.innerHTML+=msg[i++];
setTimeout(type,8);
}else{
autoFit(el);
}
}
type();
}

function autoFit(el){
let size=28;
el.style.fontSize=size+"px";

while(el.scrollHeight>el.clientHeight && size>12){
size--;
el.style.fontSize=size+"px";
}
}

/* TELEGRAM */
function openTelegram(){
window.open("https://t.me/niconiconicotine","_blank");
}

</script>

</body>
</html>
