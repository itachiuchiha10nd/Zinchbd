<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Surprise 💗</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;background:#000;font-family:sans-serif;}

.page{
position:fixed;inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
}
.page.active{opacity:1;pointer-events:auto;}

.bg{
position:absolute;inset:0;
background:url("assets/bg.jpg") center/cover no-repeat;
z-index:-1;
}

#p8 .bg{
background:url("assets/final-bg.jpg") center/cover no-repeat;
}

/* GIF */
.box{
width:260px;height:180px;
display:flex;
justify-content:center;
align-items:center;
margin-bottom:15px;
}
.box img{
width:100%;height:100%;object-fit:contain;
}

/* BUTTON */
.btn{
padding:10px 18px;
margin:6px;
border:none;
border-radius:20px;
background:#ff6eb4;
color:#fff;
font-weight:bold;
cursor:pointer;
}

/* 🎁 PERFECT GIFT GRID */
.gifts{
display:grid;
grid-template-columns:repeat(2, 150px);
gap:40px;
justify-content:center;
align-items:center;
margin-top:20px;
}

/* 🎁 GIFT BOX */
.gift{
width:150px;
height:150px;

display:flex;
justify-content:center;
align-items:center;

background:rgba(255,255,255,0.08);
border-radius:22px;

box-shadow:0 0 15px rgba(255,105,180,0.5);
transition:0.3s;
}

.gift img{
width:120px;
height:120px;
object-fit:contain;
}

.gift:hover{
transform:scale(1.1);
box-shadow:0 0 30px rgba(255,105,180,0.9);
}

/* 💌 LETTER */
.letter-container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90%;
max-width:600px;
aspect-ratio:1030/580;
}

.letter-img{
position:absolute;
width:100%;
height:100%;
object-fit:contain;
}

.letter-text{
position:absolute;
top:18%;
left:10%;
width:80%;
height:64%;

display:flex;
justify-content:center;
align-items:center;
text-align:center;

font-family:'Dancing Script', cursive;
color:#000;
line-height:1.5;

overflow:hidden;
padding:5px;
}

/* BUTTON GROUP */
.btn-group{
position:absolute;
bottom:20px;
display:flex;
gap:10px;
}
</style>
</head>

<body>

<audio id="song" src="assets/bg.mp3" loop></audio>

<!-- PAGE 1 -->
<div class="page active" id="p1">
<div class="bg"></div>

<div class="box">
<img src="assets/gif1.gif">
</div>

<button class="btn" onclick="goCake()">Back</button>
<button class="btn" onclick="go(3)">Yes 💖</button>
<button class="btn" onclick="go(2)">No 😒</button>
</div>

<!-- PAGE 2 -->
<div class="page" id="p2">
<div class="bg"></div>

<div class="box">
<img src="assets/gif2.gif">
</div>

<button class="btn" onclick="go(1)">Back</button>
</div>

<!-- GIFTS -->
<div class="page" id="p3">
<div class="bg"></div>

<div class="gifts">

<div class="gift" onclick="openGift(1)">
<img src="assets/gift.png">
</div>

<div class="gift" onclick="openGift(2)">
<img src="assets/gift.png">
</div>

<div class="gift" onclick="openGift(3)">
<img src="assets/gift.png">
</div>

<div class="gift" onclick="openGift(4)">
<img src="assets/gift.png">
</div>

</div>

<button class="btn" onclick="go(1)">Back</button>
<button id="finalBtn" class="btn" style="display:none;" onclick="go(8)">Final 💌</button>
</div>

<!-- FINAL PAGE -->
<div class="page" id="p8">
<div class="bg"></div>

<div class="letter-container">
<img src="assets/final-box.png" class="letter-img">
<div class="letter-text" id="typing"></div>
</div>

<div class="btn-group">
<button class="btn" onclick="go(3)">Back</button>
<button class="btn" onclick="openTelegram()">❤️🧿🎀</button>
</div>

</div>

<script>

/* MUSIC */
let song=document.getElementById("song");

function playMusic(){
song.play().catch(()=>{});
}

/* NAV */
function go(n){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById("p"+n).classList.add("active");

playMusic();

if(n===8) startTyping();
}

/* BACK */
function goCake(){
window.location.href="index.html#p3";
}

/* 🎁 STORAGE */
function openGift(id){

let opened = JSON.parse(localStorage.getItem("gifts")) || {};

opened[id] = true;
localStorage.setItem("gifts", JSON.stringify(opened));

checkFinal();

if(id===1) location.href="flipbook.html";
if(id===2) location.href="video1.html";
if(id===3) location.href="cardbook.html";
if(id===4) location.href="video4.html";
}

/* FINAL BUTTON */
function checkFinal(){
let opened = JSON.parse(localStorage.getItem("gifts")) || {};
if(Object.keys(opened).length === 4){
document.getElementById("finalBtn").style.display = "block";
}
}

/* 💌 FULL WISHES */
const msg = `Happy Birthday, Zinc! 🎉✨ Always stay happy, keep smiling, and enjoy your day to the fullest 😄 

Be truly happy, because you deserve all the good things in life. 

And thank you for coming into my life and becoming my friend — it really means a lot to me 🤝 

I also hope you always stay as beautiful as you are ✨ 

Just a little wish from my side 😆 

I hope we stay together at least until my birthday, because my birthday comes at the end of the year 😂 

Once again, Happy Birthday! 🎂🎈 

Stay amazing and keep shining always ✨ 

- Akarsh ❤️`;

/* TYPING */
function startTyping(){
let el=document.getElementById("typing");
el.innerHTML="";
let i=0;

function type(){
if(i<msg.length){
el.innerHTML+=msg[i++];
setTimeout(type,8);
}else{
setTimeout(()=>autoFit(el),100);
}
}
type();
}

/* AUTO FIT */
function autoFit(el){
let size=12;
let min=10;

el.style.fontSize=size+"px";

while(el.scrollHeight > el.clientHeight && size > min){
size--;
el.style.fontSize=size+"px";
}
}

/* TELEGRAM */
function openTelegram(){
window.open("https://t.me/niconiconicotine","_blank");
}

/* LOAD */
window.onload=function(){
playMusic();
checkFinal();
}

</script>

</body>
</html>
