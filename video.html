<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Surprise 💗</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins';overflow:hidden;}

/* PAGE */
.page{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
opacity:0;
pointer-events:none;
}
.page.active{opacity:1;pointer-events:auto;}

/* BACKGROUND */
.bg{
position:absolute;
inset:0;
background:url("assets/bg.jpg") center/cover no-repeat;
z-index:-1;
}

/* GIF BOX */
.box{
width:280px;
height:180px;
display:flex;
justify-content:center;
align-items:center;
border-radius:15px;
overflow:hidden;
margin-bottom:20px;
}
.box img{
width:100%;
height:100%;
object-fit:contain;
}

/* BUTTON */
.btn{
padding:10px 20px;
margin:10px;
border:none;
border-radius:20px;
background:#ff6eb4;
color:white;
font-weight:bold;
cursor:pointer;
}

/* GIFTS */
.gifts{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
}
.gift img{
width:140px;
cursor:pointer;
}

/* LETTER */
.letter-box{
position:relative;
width:320px;
height:420px;
}
.letter-box img{
width:100%;
height:100%;
}
.letter-text{
position:absolute;
top:15%;
left:50%;
transform:translateX(-50%);
width:80%;
height:70%;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
font-family:'Dancing Script';
font-weight:bold;
font-size:22px;
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="page active" id="p1">
<div class="bg"></div>

<div class="box">
<img src="assets/gif1.gif">
</div>

<div>
<button class="btn" onclick="goTo(3)">Yes 💖</button>
<button class="btn" onclick="goTo(2)">No 😒</button>
</div>

</div>

<!-- PAGE 2 -->
<div class="page" id="p2">
<div class="bg"></div>

<div class="box">
<img src="assets/gif2.gif">
</div>

<button class="btn" onclick="goTo(1)">Back</button>

</div>

<!-- PAGE 3 GIFTS -->
<div class="page" id="p3">
<div class="bg"></div>

<div class="gifts">
<div onclick="openGift(4,1)"><img src="assets/gift.png"></div>
<div onclick="openGift(5,2)"><img src="assets/gift.png"></div>
<div onclick="openGift(6,3)"><img src="assets/gift.png"></div>
<div onclick="openGift(7,4)"><img src="assets/gift.png"></div>
</div>

<button class="btn" onclick="goTo(1)">Back</button>
<button id="finalBtn" class="btn" style="display:none;" onclick="goTo(8)">Final Words 💌</button>

</div>

<!-- GIFT PAGES -->
<div class="page" id="p4"><div class="bg"></div><button class="btn" onclick="goTo(3)">Back</button></div>
<div class="page" id="p5"><div class="bg"></div><button class="btn" onclick="goTo(3)">Back</button></div>
<div class="page" id="p6"><div class="bg"></div><button class="btn" onclick="goTo(3)">Back</button></div>
<div class="page" id="p7"><div class="bg"></div><button class="btn" onclick="goTo(3)">Back</button></div>

<!-- FINAL LETTER -->
<div class="page" id="p8">
<div class="bg"></div>

<div class="letter-box">
<img src="assets/paper1.png">
<div class="letter-text" id="typing"></div>
</div>

<button class="btn" onclick="goTo(3)">Back</button>

</div>

<script>

/* NAV */
function goTo(n){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById("p"+n).classList.add("active");

if(n===8) startTyping();
}

/* TRACK GIFTS */
let opened={};

function openGift(page,id){
opened[id]=true;
goTo(page);

if(Object.keys(opened).length===4){
document.getElementById("finalBtn").style.display="block";
}
}

/* TYPING */
const msg=`Happy Birthday, Zinc! 🎉✨ Always stay happy, keep smiling, and enjoy your day 😄 You deserve everything good 💖 Thank you for being in my life 🤝 Stay amazing always ✨`;

function startTyping(){
let el=document.getElementById("typing");
el.innerHTML="";
let i=0;

function type(){
if(i<msg.length){
el.innerHTML+=msg[i];
i++;
setTimeout(type,10);
}else autoFit(el);
}
type();
}

/* AUTO FIT */
function autoFit(el){
let size=22;
el.style.fontSize=size+"px";

while(el.scrollHeight>el.clientHeight){
size--;
el.style.fontSize=size+"px";
}
}

</script>

</body>
</html>
