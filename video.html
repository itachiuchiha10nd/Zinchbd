<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surprise 💗</title>

<style>
body{margin:0;overflow:hidden;font-family:sans-serif;}
.page{position:fixed;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;opacity:0;}
.page.active{opacity:1;}
.bg{position:absolute;inset:0;background:url("assets/bg.jpg") center/cover no-repeat;z-index:-1;}

.box{width:230px;height:150px;}
.box img{width:100%;height:100%;object-fit:contain;}

.gifts{display:grid;grid-template-columns:repeat(2,130px);gap:25px;}
.gift img{width:130px;cursor:pointer;}

.btn{margin:10px;padding:10px;background:#ff6eb4;color:#fff;border:none;border-radius:20px;}
</style>
</head>

<body>

<div class="page active" id="p1">
<div class="bg"></div>
<div class="box">
<img src="assets/komaru_gif_AgADUw20YAAsLuiUY-ezgif.com-video-to-gif-converter.gif">
</div>
<button class="btn" onclick="go(3)">Yes</button>
<button class="btn" onclick="go(2)">No</button>
</div>

<div class="page" id="p2">
<div class="bg"></div>
<div class="box">
<img src="assets/komaru_gif_AgADUgY20AAsLuiUY-ezgif.com-video-to-gif-converter.gif">
</div>
<button class="btn" onclick="go(1)">Back</button>
</div>

<div class="page" id="p3">
<div class="bg"></div>

<div class="gifts">
<img src="assets/gift.png" onclick="openGift(1)">
<img src="assets/gift.png" onclick="openGift(2)">
<img src="assets/gift.png" onclick="openGift(3)">
<img src="assets/gift.png" onclick="openGift(4)">
</div>

<button id="finalBtn" class="btn" style="display:none;" onclick="go(4)">Final Words</button>
</div>

<div class="page" id="p4">
<div class="bg"></div>
<h2 style="color:white;">💌 Final Message</h2>
</div>

<script>
function go(n){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById("p"+n).classList.add("active");
}

let opened={};

function openGift(id){
if(id===1){window.location.href="flipbook.html";return;}
if(id===2){window.location.href="video2.html";return;}

opened[id]=true;

if(Object.keys(opened).length===4){
document.getElementById("finalBtn").style.display="block";
}
}
</script>

</body>
</html>
