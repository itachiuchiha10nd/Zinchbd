<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Surprise 💗</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;font-family:sans-serif;background:#000;}

/* PAGE SYSTEM */
.page{
position:fixed;inset:0;
display:flex;flex-direction:column;
justify-content:center;align-items:center;
opacity:0;pointer-events:none;
}
.page.active{opacity:1;pointer-events:auto;}

/* BACKGROUND */
.bg{
position:absolute;inset:0;
background:url("assets/bg.jpg") center/cover no-repeat;
z-index:-1;
}

/* FINAL PAGE BG */
#p8 .bg{
background:url("assets/final-bg.png") center/cover no-repeat;
}

/* GIF BOX */
.box{
width:240px;height:150px;
border-radius:12px;
overflow:hidden;
margin-bottom:15px;
}

/* BUTTON */
.btn{
padding:10px 18px;
margin:6px;
border:none;
border-radius:20px;
background:#ff6eb4;
color:white;
font-weight:bold;
cursor:pointer;
}

/* PERFECT CENTER GIF GRID */
.gifts{
display:grid;
grid-template-columns:repeat(2,120px);
gap:20px;
justify-content:center;
align-items:center;
}

.gift{
display:flex;
justify-content:center;
}

.gift img{
width:120px;
height:120px;
object-fit:contain;
cursor:pointer;
transition:.3s;
}
.gift img:hover{transform:scale(1.1);}

/* LETTER */
.letter{
position:relative;
width:300px;height:420px;
}
.letter img{width:100%;height:100%;}
.text{
position:absolute;
top:15%;
left:50%;
transform:translateX(-50%);
width:80%;
text-align:center;
font-family:'Dancing Script';
font-size:22px;
color:#fff;
}
</style>
</head>

<body>

<audio id="song" src="assets/bg.mp3" loop></audio>

<!-- PAGE 1 YES/NO -->
<div class="page active" id="p1">
<div class="bg"></div>

<div class="box">
<img src="assets/gif1.gif" width="100%">
</div>

<button class="btn" onclick="goCake()">Back</button>
<button class="btn" onclick="go(3)">Yes 💖</button>
<button class="btn" onclick="go(2)">No 😒</button>
</div>

<!-- PAGE 2 -->
<div class="page" id="p2">
<div class="bg"></div>

<div class="box">
<img src="assets/gif2.gif" width="100%">
</div>

<button class="btn" onclick="go(1)">Back</button>
</div>

<!-- PAGE 3 GIFTS -->
<div class="page" id="p3">
<div class="bg"></div>

<div class="gifts">
<div class="gift" onclick="openGift(1)"><img src="assets/gift.png"></div>
<div class="gift" onclick="openGift(2)"><img src="assets/gift.png"></div>
<div class="gift" onclick="openGift(3)"><img src="assets/gift.png"></div>
<div class="gift" onclick="openGift(4)"><img src="assets/gift.png"></div>
</div>

<button class="btn" onclick="go(1)">Back</button>
<button id="finalBtn" class="btn" style="display:none;" onclick="go(8)">Final Words 💌</button>
</div>

<!-- GIFT 3 -->
<div class="page" id="p6">
<div class="bg"></div>
<h2 style="color:white;">Gift 3 🎁</h2>
<button class="btn" onclick="go(3)">Back</button>
</div>

<!-- GIFT 4 -->
<div class="page" id="p7">
<div class="bg"></div>
<h2 style="color:white;">Gift 4 🎁</h2>
<button class="btn" onclick="go(3)">Back</button>
</div>

<!-- FINAL PAGE -->
<div class="page" id="p8">
<div class="bg"></div>

<div class="letter">
<img src="assets/paper1.png">
<div class="text" id="typing"></div>
</div>

<button class="btn" onclick="go(3)">Back</button>
</div>

<script>

/* MUSIC */
let song=document.getElementById("song");

function playMusic(){
song.play().catch(()=>{});
}

function pauseMusic(){
localStorage.setItem("time",song.currentTime);
song.pause();
}

function resumeMusic(){
let t=localStorage.getItem("time");
if(t){song.currentTime=t;}
song.play().catch(()=>{});
}

/* NAV */
function go(n){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById("p"+n).classList.add("active");
resumeMusic();

if(n===8) startTyping();
}

/* BACK TO CAKE */
function goCake(){
window.location.href="index.html#p3";
}

/* GIFTS */
let opened={};

function openGift(id){

if(id===1){
pauseMusic();
window.location.href="flipbook.html";
return;
}

if(id===2){
pauseMusic();
window.location.href="video1.html";
return;
}

if(id===3){opened[id]=true;go(6);}
if(id===4){opened[id]=true;go(7);}

if(Object.keys(opened).length===4){
document.getElementById("finalBtn").style.display="block";
}
}

/* TYPING */
const msg="Happy Birthday Zinc 🎉💖 Stay happy always ✨";

function startTyping(){
let el=document.getElementById("typing");
el.innerHTML="";
let i=0;

function type(){
if(i<msg.length){
el.innerHTML+=msg[i++];
setTimeout(type,15);
}
}
type();
}

/* LOAD */
window.onload=resumeMusic;

</script>

</body>
</html>
