<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Surprise 💗</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;font-family:sans-serif;background:#000;}

/* PAGE */
.page{
position:fixed;inset:0;
display:flex;flex-direction:column;
justify-content:center;align-items:center;
opacity:0;pointer-events:none;
}
.page.active{opacity:1;pointer-events:auto;}

/* BG */
.bg{
position:absolute;inset:0;
background:url("assets/bg.jpg") center/cover no-repeat;
z-index:-1;
}

/* FINAL BG */
#p8 .bg{
background:url("assets/final-bg.jpg") center/cover no-repeat;
}

/* GIF BOX */
.box{
width:240px;height:150px;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
margin-bottom:15px;
}
.box img{
max-width:100%;
max-height:100%;
object-fit:contain;
}

/* BUTTON */
.btn{
padding:10px 18px;
margin:6px;
border:none;
border-radius:20px;
background:#ff6eb4;
color:white;
font-weight:bold;
cursor:pointer;
}

/* 🎁 GRID */
.gifts{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:25px;
width:100%;
max-width:340px;
justify-content:center;
}

.gift{
display:flex;
justify-content:center;
}

.gift img{
width:140px;
height:140px;
object-fit:contain;
cursor:pointer;
}

/* 🔥 LETTER (LANDSCAPE + PERFECT FIT) */
.letter{
position:relative;
width:90vw;
max-width:650px;
height:55vh;

display:flex;
justify-content:center;
align-items:center;
}

.letter img{
width:100%;
height:100%;
object-fit:contain;
}

/* TEXT */
.text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);

width:85%;
height:75%;

display:flex;
justify-content:center;
align-items:center;
text-align:center;

font-family:'Poppins', sans-serif;
font-weight:bold;
color:#000;

font-size:26px;
line-height:1.4;

overflow:hidden;
}
</style>
</head>

<body>

<audio id="song" src="assets/bg.mp3" loop></audio>

<!-- PAGE 1 -->
<div class="page active" id="p1">
<div class="bg"></div>

<div class="box">
<img src="assets/gif1.gif">
</div>

<button class="btn" onclick="goCake()">Back</button>
<button class="btn" onclick="go(3)">Yes 💖</button>
<button class="btn" onclick="go(2)">No 😒</button>
</div>

<!-- PAGE 2 -->
<div class="page" id="p2">
<div class="bg"></div>

<div class="box">
<img src="assets/gif2.gif">
</div>

<button class="btn" onclick="go(1)">Back</button>
</div>

<!-- GIFTS -->
<div class="page" id="p3">
<div class="bg"></div>

<div class="gifts">
<div class="gift" onclick="openGift(1)"><img src="assets/gift.png"></div>
<div class="gift" onclick="openGift(2)"><img src="assets/gift.png"></div>
<div class="gift" onclick="openGift(3)"><img src="assets/gift.png"></div>
<div class="gift" onclick="openGift(4)"><img src="assets/gift.png"></div>
</div>

<button class="btn" onclick="go(1)">Back</button>
<button id="finalBtn" class="btn" style="display:none;" onclick="go(8)">Final Words 💌</button>
</div>

<!-- GIFT 4 -->
<div class="page" id="p7">
<div class="bg"></div>
<h2 style="color:white;">Gift 4 🎁</h2>
<button class="btn" onclick="go(3)">Back</button>
</div>

<!-- FINAL PAGE -->
<div class="page" id="p8">
<div class="bg"></div>

<div class="letter">
<img src="assets/fina-box.png">
<div class="text" id="typing"></div>
</div>

<button class="btn" onclick="go(3)">Back</button>
</div>

<script>

/* 🎵 MUSIC */
let song=document.getElementById("song");

function pauseMusic(){
localStorage.setItem("time",song.currentTime);
song.pause();
}

function resumeMusic(){
let t=localStorage.getItem("time");
if(t){song.currentTime=t;}
song.play().catch(()=>{});
}

/* NAV */
function go(n){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById("p"+n).classList.add("active");

resumeMusic();

if(n===8) startTyping();
}

/* BACK */
function goCake(){
window.location.href="index.html#p3";
}

/* GIFTS */
let opened = JSON.parse(localStorage.getItem("gifts")) || {};

function openGift(id){

opened[id]=true;
localStorage.setItem("gifts", JSON.stringify(opened));

if(id===1){pauseMusic();window.location.href="flipbook.html";return;}
if(id===2){pauseMusic();window.location.href="video1.html";return;}
if(id===3){pauseMusic();window.location.href="cardbook.html";return;}

if(id===4){go(7);}

checkFinal();
}

function checkFinal(){
let data = JSON.parse(localStorage.getItem("gifts")) || {};
if(Object.keys(data).length===4){
document.getElementById("finalBtn").style.display="block";
}
}

/* 🔥 FULL MESSAGE */
const msg = `Happy Birthday, Zinc ❤️

I know all of this might feel a little cringe… maybe even childish. But honestly, I still wanted to do it. Because sometimes, the simplest and most genuine things come from the heart, even if they’re not perfect.

I also know that I’m not like your other friends. Maybe they’re better than me in many ways. Maybe they’re giving you expensive gifts, planning big surprises, or doing things that I can’t. And yeah… I’ve thought about that too.

But I truly believe that money can’t buy happiness. What really matters is the effort, the intention, and the feelings behind it. And whatever this is… it comes from a real place.

I just wanted to say this much — I hope you like this little surprise. I hope it makes you smile, even if just for a moment. And more than anything, I hope you always stay happy.

I really want us to always remain friends, Zinc. That matters to me more than I can properly explain.

There’s actually something I wanted to say… but I’ll leave it for now. I don’t want to risk ruining your day.

So for now, that’s it.

Once again, Happy Birthday, Zinc ❤️`;

/* 🔥 TYPING + AUTO FIT */
function startTyping(){
let el=document.getElementById("typing");
el.innerHTML="";
let i=0;

function type(){
if(i<msg.length){
el.innerHTML+=msg[i++];
setTimeout(type,8);
}else{
autoFit(el);
}
}
type();
}

function autoFit(el){
let size=26;
el.style.fontSize=size+"px";

while(el.scrollHeight > el.clientHeight && size > 14){
size--;
el.style.fontSize=size+"px";
}
}

/* LOAD */
window.onload=function(){
resumeMusic();
checkFinal();
}

</script>

</body>
</html>
