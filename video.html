<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Surprise 💗</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;background:#000;font-family:sans-serif;}

.page{
position:fixed;inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
opacity:0;
pointer-events:none;
}
.page.active{opacity:1;pointer-events:auto;}

.bg{
position:absolute;inset:0;
background:url("assets/final-bg.jpg") center/cover no-repeat;
z-index:-1;
}

#p8 .bg{
background:url("assets/fina-box.png") center/cover no-repeat;
}

/* GIF */
.box{
width:260px;height:180px;
display:flex;
justify-content:center;
align-items:center;
margin-bottom:15px;
}
.box img{
width:100%;height:100%;object-fit:contain;
}

/* BUTTON */
.btn{
padding:10px 18px;
margin:6px;
border:none;
border-radius:20px;
background:#ff6eb4;
color:#fff;
font-weight:bold;
cursor:pointer;
}

/* 🎁 GIF GRID */
.gifts{
display:grid;
grid-template-columns:repeat(2,150px);
gap:30px;
}

.gift img{
width:120px;height:120px;
cursor:pointer;
}

/* 💌 LETTER BOX EXACT */
.text-box{
position:absolute;
top:48%;
left:50%;
transform:translate(-50%,-50%);

/* 🔥 exact ratio */
width:85%;
max-width:520px;
aspect-ratio:1030 / 580;

padding:25px;

display:flex;
justify-content:center;
align-items:center;

overflow:hidden;
}

/* TEXT */
.final-text{
width:100%;
height:100%;

display:flex;
justify-content:center;
align-items:center;
text-align:center;

font-family:'Dancing Script', cursive;
color:#000;

line-height:1.6;
word-wrap:break-word;
}

/* BUTTON GROUP */
.btn-group{
position:absolute;
bottom:25px;
display:flex;
gap:10px;
}
</style>
</head>

<body>

<audio id="song" src="assets/bg.mp3" loop></audio>

<!-- PAGE 1 -->
<div class="page active" id="p1">
<div class="bg"></div>

<div class="box">
<img src="assets/gif1.gif">
</div>

<button class="btn" onclick="goCake()">Back</button>
<button class="btn" onclick="go(3)">Yes 💖</button>
<button class="btn" onclick="go(2)">No 😒</button>
</div>

<!-- PAGE 2 -->
<div class="page" id="p2">
<div class="bg"></div>

<div class="box">
<img src="assets/gif2.gif">
</div>

<button class="btn" onclick="go(1)">Back</button>
</div>

<!-- GIFTS -->
<div class="page" id="p3">
<div class="bg"></div>

<div class="gifts">
<div onclick="openGift(1)"><img src="assets/gift.png"></div>
<div onclick="openGift(2)"><img src="assets/gift.png"></div>
<div onclick="openGift(3)"><img src="assets/gift.png"></div>
<div onclick="openGift(4)"><img src="assets/gift.png"></div>
</div>

<button class="btn" onclick="go(1)">Back</button>
<button id="finalBtn" class="btn" style="display:none;" onclick="go(8)">Final 💌</button>
</div>

<!-- FINAL PAGE -->
<div class="page" id="p8">
<div class="bg"></div>

<div class="text-box">
<div class="final-text" id="typing"></div>
</div>

<div class="btn-group">
<button class="btn" onclick="go(3)">Back</button>
<button class="btn" onclick="openTelegram()">❤️🧿🎀</button>
</div>

</div>

<script>

let song=document.getElementById("song");

function playMusic(){
song.play().catch(()=>{});
}

/* NAV */
function go(n){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById("p"+n).classList.add("active");

playMusic();

if(n===8) startTyping();
}

/* BACK */
function goCake(){
window.location.href="index.html#p3";
}

/* GIF OPEN */
function openGift(id){

if(id===1) location.href="flipbook.html";
if(id===2) location.href="video1.html";
if(id===3) location.href="cardbook.html";
if(id===4) location.href="video4.html";

let opened = JSON.parse(localStorage.getItem("gifts")) || {};
opened[id]=true;
localStorage.setItem("gifts", JSON.stringify(opened));

checkFinal();
}

function checkFinal(){
let data = JSON.parse(localStorage.getItem("gifts")) || {};
if(Object.keys(data).length===4){
document.getElementById("finalBtn").style.display="block";
}
}

/* FULL TEXT */
const msg = `Happy Birthday, Zinc ❤️

I know all of this might feel a little cringe… maybe even childish. But honestly, I still wanted to do it. Because sometimes, the simplest and most genuine things come from the heart.

I also know that I’m not like your other friends.

But I truly believe that money can’t buy happiness.

What really matters is the effort, the intention, and the feelings behind it.

I just wanted to say this much — I hope you like this little surprise.

I really want us to always remain friends, Zinc.

Once again, Happy Birthday, Zinc ❤️`;

/* TYPE + SAFE FIT */
function startTyping(){
let el=document.getElementById("typing");
el.innerHTML="";
let i=0;

function type(){
if(i<msg.length){
el.innerHTML+=msg[i++];
setTimeout(type,8);
}else{
setTimeout(()=>autoFit(el),100);
}
}
type();
}

/* 🔥 SAFE AUTO FIT (NO VANISH) */
function autoFit(el){
let size=32;
let min=14;

el.style.fontSize=size+"px";

while(el.scrollHeight > el.clientHeight && size > min){
size--;
el.style.fontSize=size+"px";
}
}

function openTelegram(){
window.open("https://t.me/niconiconicotine","_blank");
}

window.onload=function(){
playMusic();
checkFinal();
}

</script>

</body>
</html>
