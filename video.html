<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins';overflow:hidden;}

/* PAGE */
.page{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

/* BACKGROUND */
.bg{
position:absolute;
inset:0;
background:url("assets/bg.jpg") center/cover no-repeat;
z-index:-1;
}

/* GIF BOX */
.video-box{
width:300px;
height:180px;
border-radius:15px;
overflow:hidden;
box-shadow:0 0 25px rgba(255,110,180,0.7);
}
.video-box img{
width:100%;
height:100%;
object-fit:cover;
}

/* BUTTON */
.btn{
margin:10px;
padding:12px 25px;
background:#ff6eb4;
border:none;
border-radius:25px;
color:white;
font-weight:bold;
cursor:pointer;
}

/* BACK */
.top-back{
position:absolute;
top:20px;
left:20px;
}

/* 🎁 4 BOX GRID FIX */
.gift-container{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;

width:100%;
max-width:500px;
padding:20px;
}

/* BIG GIFTS */
.gift{
width:100%;
height:160px;

object-fit:contain;

cursor:pointer;
transition:.3s;
}

.gift:hover{
transform:scale(1.05);
filter:drop-shadow(0 0 20px pink);
}

/* LETTER */
.letter{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:15px;
backdrop-filter:blur(10px);
font-family:'Dancing Script';
font-size:22px;
text-align:center;
color:white;
max-width:320px;
}

/* FINAL BUTTON */
.final-btn{
display:none;
margin-top:20px;
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="page" id="p1">
<div class="bg"></div>

<button class="btn top-back" onclick="goHome()">⬅ Back</button>

<div class="video-box">
<img src="assets/gif1.gif">
</div>

<div style="margin-top:20px;">
<button class="btn" onclick="goTo(2)">Yes 💖</button>
<button class="btn" onclick="goTo(3)">No 😏</button>
</div>

</div>

<!-- PAGE 2 (GIFTS) -->
<div class="page" id="p2" style="display:none;">
<div class="bg"></div>

<button class="btn top-back" onclick="goTo(1)">⬅ Back</button>

<div class="gift-container">
<img src="assets/gift.png" class="gift" onclick="openGift(1)">
<img src="assets/gift.png" class="gift" onclick="openGift(2)">
<img src="assets/gift.png" class="gift" onclick="openGift(3)">
<img src="assets/gift.png" class="gift" onclick="openGift(4)">
</div>

<button id="finalBtn" class="btn final-btn" onclick="goTo('final')">
Final Words 💌
</button>

</div>

<!-- PAGE 3 -->
<div class="page" id="p3" style="display:none;">
<div class="bg"></div>

<button class="btn top-back" onclick="goTo(1)">⬅ Back</button>

<div class="video-box">
<img src="assets/gif2.gif">
</div>

</div>

<!-- GIFT PAGES -->
<div class="page" id="g1" style="display:none;">
<div class="bg"></div>
<button class="btn top-back" onclick="goTo(2)">⬅ Back</button>
<div class="letter">🎁 Surprise 1 💖</div>
</div>

<div class="page" id="g2" style="display:none;">
<div class="bg"></div>
<button class="btn top-back" onclick="goTo(2)">⬅ Back</button>
<div class="letter">🎁 Surprise 2 🎉</div>
</div>

<div class="page" id="g3" style="display:none;">
<div class="bg"></div>
<button class="btn top-back" onclick="goTo(2)">⬅ Back</button>
<div class="letter">🎁 Surprise 3 ✨</div>
</div>

<div class="page" id="g4" style="display:none;">
<div class="bg"></div>
<button class="btn top-back" onclick="goTo(2)">⬅ Back</button>
<div class="letter">🎁 Surprise 4 😍</div>
</div>

<!-- FINAL PAGE -->
<div class="page" id="final" style="display:none;">
<div class="bg"></div>

<button class="btn top-back" onclick="goTo(2)">⬅ Back</button>

<div class="letter">
💌 Happy Birthday Znic!  
You opened all gifts 🎉  
This was made just for you 💖  
Stay happy always ✨
</div>

</div>

<script>

/* NAV */
function goTo(page){
document.querySelectorAll(".page").forEach(p=>p.style.display="none");

if(typeof page === "number"){
document.getElementById("p"+page).style.display="flex";
}else{
document.getElementById(page).style.display="flex";
}
}

/* HOME */
function goHome(){
window.location.href="index.html";
}

/* TRACK */
let opened=[];

function openGift(n){

document.querySelectorAll(".page").forEach(p=>p.style.display="none");
document.getElementById("g"+n).style.display="flex";

if(!opened.includes(n)){
opened.push(n);
}

/* SHOW FINAL BUTTON */
if(opened.length===4){
document.getElementById("finalBtn").style.display="inline-block";
}

}

</script>

</body>
</html>
