<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Surprise 💗</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;background:#000;font-family:sans-serif;}

/* PAGE */
.page{
position:fixed;inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
}
.page.active{opacity:1;pointer-events:auto;}

/* BG */
.bg{
position:absolute;
inset:0;
background:url("assets/bg.jpg") center/cover no-repeat;
z-index:-1;
}

#p8 .bg{
background:url("assets/final-bg.jpg") center/cover no-repeat;
}

/* GIF BOX */
.box{
width:260px;height:180px;
display:flex;
justify-content:center;
align-items:center;
margin-bottom:15px;
}
.box img{
width:100%;
height:100%;
object-fit:contain;
}

/* BUTTON */
.btn{
padding:10px 18px;
margin:6px;
border:none;
border-radius:20px;
background:#ff6eb4;
color:#fff;
font-weight:bold;
cursor:pointer;
}

/* 🎁 GRID */
.gifts{
display:grid;
grid-template-columns:repeat(2,150px);
grid-template-rows:repeat(2,150px);
gap:30px;
justify-content:center;
}

.gift{
display:flex;
justify-content:center;
align-items:center;
}

.gift img{
width:120px;
height:120px;
cursor:pointer;
}

/* 💌 TEXT BOX */
.text-box{
position:absolute;
top:47%;
left:50%;
transform:translate(-50%,-50%);

width:75%;
max-width:360px;
aspect-ratio:2/1;

padding:15px;

display:flex;
justify-content:center;
align-items:center;

overflow:hidden;
}

.final-text{
width:100%;
height:100%;

display:flex;
justify-content:center;
align-items:center;
text-align:center;

font-family:'Dancing Script', cursive;
color:#000;

line-height:1.5;
overflow:hidden;
}

/* BUTTON GROUP */
.btn-group{
position:absolute;
bottom:20px;
display:flex;
gap:10px;
}
</style>
</head>

<body>

<audio id="song" src="assets/bg.mp3" loop></audio>

<!-- PAGE 1 -->
<div class="page active" id="p1">
<div class="bg"></div>

<div class="box">
<img src="assets/gif1.gif">
</div>

<button class="btn" onclick="goCake()">Back</button>
<button class="btn" onclick="go(3)">Yes 💖</button>
<button class="btn" onclick="go(2)">No 😒</button>
</div>

<!-- PAGE 2 -->
<div class="page" id="p2">
<div class="bg"></div>

<div class="box">
<img src="assets/gif2.gif">
</div>

<button class="btn" onclick="go(1)">Back</button>
</div>

<!-- GIFTS -->
<div class="page" id="p3">
<div class="bg"></div>

<div class="gifts">
<div class="gift" onclick="openGift(1)"><img src="assets/gift.png"></div>
<div class="gift" onclick="openGift(2)"><img src="assets/gift.png"></div>
<div class="gift" onclick="openGift(3)"><img src="assets/gift.png"></div>
<div class="gift" onclick="openGift(4)"><img src="assets/gift.png"></div>
</div>

<button class="btn" onclick="go(1)">Back</button>
<button id="finalBtn" class="btn" style="display:none;" onclick="go(8)">Final 💌</button>
</div>

<!-- FINAL -->
<div class="page" id="p8">
<div class="bg"></div>

<div class="text-box">
<div class="final-text" id="typing"></div>
</div>

<div class="btn-group">
<button class="btn" onclick="go(3)">Back</button>
<button class="btn" onclick="openTelegram()">❤️🧿🎀</button>
</div>

</div>

<script>

/* MUSIC */
let song=document.getElementById("song");

function playMusic(){
song.play().catch(()=>{});
}

/* NAV */
function go(n){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById("p"+n).classList.add("active");

playMusic();

if(n===8) startTyping();
}

/* BACK */
function goCake(){
window.location.href="index.html#p3";
}

/* GIF OPEN */
function openGift(id){

if(id===1) window.location.href="flipbook.html";
if(id===2) window.location.href="video1.html";
if(id===3) window.location.href="cardbook.html";
if(id===4) window.location.href="video4.html";

let opened = JSON.parse(localStorage.getItem("gifts")) || {};
opened[id]=true;
localStorage.setItem("gifts", JSON.stringify(opened));

checkFinal();
}

/* FINAL BUTTON */
function checkFinal(){
let data = JSON.parse(localStorage.getItem("gifts")) || {};
if(Object.keys(data).length===4){
document.getElementById("finalBtn").style.display="block";
}
}

/* FULL TEXT */
const msg = `Happy Birthday, Zinc ❤️

I know all of this might feel a little cringe… maybe even childish. But honestly, I still wanted to do it. Because sometimes, the simplest and most genuine things come from the heart, even if they’re not perfect.
I also know that I’m not like your other friends. Maybe they’re better than me in many ways. Maybe they’re giving you expensive gifts, planning big surprises, or doing things that I can’t.But I truly believe that money can’t buy happiness.What really matters is the effort, the intention, and the feelings behind it.
I just wanted to say this much — I hope you like this little surprise.
I really want us to always remain friends, Zinc.There’s actually something I wanted to say… but I’ll leave it for now.
So for now, that’s it.

Once again, Happy Birthday, Zinc ❤️`;

/* TYPE + FIT */
function startTyping(){
let el=document.getElementById("typing");
el.innerHTML="";
let i=0;

function type(){
if(i<msg.length){
el.innerHTML+=msg[i++];
setTimeout(type,8);
}else{
setTimeout(()=>autoFit(el),100);
}
}
type();
}

function autoFit(el){
let size=30;
el.style.fontSize=size+"px";

while(el.scrollHeight > el.clientHeight && size > 12){
size--;
el.style.fontSize=size+"px";
}
}

/* TELEGRAM */
function openTelegram(){
window.open("https://t.me/niconiconicotine","_blank");
}

/* LOAD */
window.onload=function(){
playMusic();
checkFinal();
}

</script>

</body>
</html>
