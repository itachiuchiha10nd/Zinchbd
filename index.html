<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HAPPY BIRTHDAY ZNIC 🎉</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Lato&display=swap" rel="stylesheet">

<style>

body{
margin:0;
overflow:hidden;
font-family:'Lato',sans-serif;
}

/* 🌸 BACKGROUND */
.bg{
position:fixed;
width:100%;
height:100%;
background:url("assets/bg.jpg") no-repeat center/cover;
z-index:-5;
}

/* PAGE SYSTEM */
.page{
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
opacity:0;
transition:0.4s;
pointer-events:none;
}
.page.active{
opacity:1;
pointer-events:auto;
}

/* TITLE */
.title{
font-family:'Dancing Script',cursive;
font-size:36px;
color:#ff3d8d;
margin-bottom:20px;
}

/* ENVELOPE */
.envelope img{
width:260px;
cursor:pointer;
}

/* 🎂 CAKE PAGE */
.cake-page{
position:relative;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
overflow:hidden;
}

/* 🎀 FULL DECOR BACKGROUND */
.decor{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
z-index:-3;
}

/* ✨ TOP LIGHT IMAGE */
.light{
position:absolute;
top:0;
left:0;
width:100%;
height:130px;
object-fit:cover;
z-index:-2;
}

/* 🎈 BALLOONS */
.balloon{
position:absolute;
bottom:-60px;
width:60px;
animation:floatUp linear forwards;
z-index:-1;
}
@keyframes floatUp{
to{transform:translateY(-120vh);}
}

/* 🎂 CAKE */
.cake-box{
position:relative;
z-index:2;
}
.cake-box img{
width:240px;
}

/* 🔥 FLAME */
.flame{
position:absolute;
top:22px;
left:50%;
transform:translateX(-50%);
width:12px;
height:18px;
background:radial-gradient(circle,#fff,#ffd700,orange,red);
border-radius:50%;
animation:flicker 0.2s infinite alternate;
}

/* ✨ GLOW */
.glow{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
width:120px;
height:120px;
background:radial-gradient(circle,rgba(255,200,100,0.5),transparent);
border-radius:50%;
animation:glowPulse 1s infinite alternate;
}

@keyframes flicker{
from{transform:translateX(-50%) scale(1);}
to{transform:translateX(-50%) scale(1.15);}
}
@keyframes glowPulse{
from{opacity:0.6;}
to{opacity:1;}
}

/* BUTTON */
.btn{
margin-top:20px;
padding:10px 22px;
background:#ff6eb4;
border:none;
color:white;
border-radius:20px;
cursor:pointer;
}

/* 📜 LETTER */
.paper{
position:relative;
width:calc(100vw - 60px);
height:calc(100vh - 150px);
max-width:520px;
max-height:700px;
}
.paper img{
width:100%;
height:100%;
object-fit:contain;
}
.text{
position:absolute;
top:27%;
left:50%;
transform:translateX(-50%);
width:68%;
height:50%;
font-family:'Dancing Script',cursive;
font-size:18px;
text-align:center;
white-space:pre-line;
}

/* POPUP */
.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px 30px;
border-radius:20px;
font-family:'Dancing Script';
font-size:26px;
color:#ff3d8d;
display:none;
}

</style>
</head>

<body>

<div class="bg"></div>

<!-- PAGE 1 -->
<div class="page active" id="p1">
<div class="title">HAPPY BIRTHDAY ZNIC 🎉</div>

<div class="envelope" onclick="goTo(2)">
<img src="assets/envelope.png">
</div>

<p>Tap to open 💌</p>
</div>

<!-- PAGE 2 🎂 -->
<div class="page" id="p2">

<div class="cake-page">

<img src="assets/decor.png" class="decor">
<img src="assets/light.png" class="light">

<div class="cake-box">
<img src="assets/cake.png">
<div class="glow" id="glow"></div>
<div class="flame" id="flame"></div>
</div>

<button class="btn" onclick="blowCandle()">Blow Candle 🕯️</button>

<div id="nextBtn" style="display:none;">
<button class="btn" onclick="goTo(3)">Next ➡</button>
</div>

</div>

</div>

<!-- PAGE 3 -->
<div class="page" id="p3">

<div class="paper">
<img src="assets/paper.png">
<div class="text" id="typing"></div>
</div>

<button class="btn" onclick="goTo(2)">⬅ Back</button>

</div>

<div class="popup" id="popup">Happy Birthday Znic 🎉</div>

<script>

/* NAVIGATION */
function goTo(n){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById("p"+n).classList.add("active");

if(n===3) startTyping();
}

/* 🎂 BLOW */
function blowCandle(){
document.getElementById("flame").style.opacity="0";
document.getElementById("glow").style.opacity="0";

let p=document.getElementById("popup");
p.style.display="block";

setTimeout(()=>{
p.style.display="none";
document.getElementById("nextBtn").style.display="block";
},1500);
}

/* 🎈 BALLOONS ONLY PAGE 2 */
setInterval(()=>{
if(!document.getElementById("p2").classList.contains("active")) return;

let b=document.createElement("img");
b.src="assets/balloon.png";
b.className="balloon";

b.style.left=Math.random()*90+"%";
b.style.animationDuration=(5+Math.random()*5)+"s";

document.querySelector(".cake-page").appendChild(b);

setTimeout(()=>b.remove(),10000);

},800);

/* ✍️ TEXT */
const msg=`Happy Birthday, Zinc! 🎉✨

Stay bold, stay crazy 😌🔥

Enjoy every moment 💙🎂`;

let i=0;

function startTyping(){
let el=document.getElementById("typing");
el.innerHTML="";
i=0;

function type(){
if(i<msg.length){
el.innerHTML+=msg.charAt(i);
i++;
setTimeout(type,18);
}
}
type();
}

</script>

</body>
</html>
