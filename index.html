<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HAPPY BIRTHDAY ZNIC 🎉</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;font-family:'Poppins';}

/* PAGE */
.page{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:.4s;
}
.page.active{opacity:1;pointer-events:auto;}

/* ENTRY */
#p0{background:url("assets/entry-bg.jpg") center/cover no-repeat;}
.pass-box{
position:absolute;
right:6%;
top:50%;
transform:translateY(-50%);
padding:25px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
border-radius:20px;
}
.display{
color:#ff6eb4;
font-size:36px;
font-weight:bold;
letter-spacing:8px;
margin-bottom:20px;
text-shadow:0 0 10px #ff6eb4,0 0 20px #ff6eb4,0 0 40px #ff6eb4;
}
.pad{display:grid;grid-template-columns:repeat(3,70px);gap:10px;}
.pad button{
padding:15px;border:none;border-radius:15px;
background:#ff6eb4;color:#fff;font-size:20px;font-weight:bold;cursor:pointer;
}

/* BG */
.bg{
position:absolute;inset:0;
background:url("assets/bg.jpg") center/cover no-repeat;
z-index:-1;
}

/* ENVELOPE */
.envelope{width:250px;cursor:pointer;}

/* LETTER */
.paper{position:relative;width:320px;}
.paper img{width:100%;}
.text{
position:absolute;top:25%;left:50%;
transform:translateX(-50%);
width:70%;font-family:'Dancing Script';
font-size:18px;text-align:center;color:#000;
}

/* BUTTON */
.btn{
margin:10px;padding:12px 25px;
background:#ff6eb4;border:none;border-radius:25px;
color:white;font-weight:bold;cursor:pointer;
}

/* CAKE */
.cake-bg{
position:absolute;inset:0;
background:url("assets/bg2.jpg") center/cover no-repeat;
z-index:-1;
}
.cake-box{position:relative;}
.cake-box img{width:280px;}

/* 🔥 REAL FLAME */
.flame{
position:absolute;
top:12%;left:50%;
transform:translate(-50%,-50%);
width:12px;height:22px;
background:radial-gradient(circle,#fff,#ffd700,orange,red);
border-radius:50%;
animation:flicker 0.15s infinite alternate;
}
@keyframes flicker{
0%{transform:translate(-50%,-50%) scale(1);}
100%{transform:translate(-50%,-50%) scale(1.3);}
}

/* GLOW */
.glow{
position:absolute;
top:10%;left:50%;
transform:translate(-50%,-50%);
width:120px;height:120px;
background:radial-gradient(circle,rgba(255,200,100,0.6),transparent);
}

/* 💨 SMOKE */
.smoke{
position:absolute;
top:12%;left:50%;
transform:translate(-50%,-50%);
width:10px;height:10px;
background:rgba(200,200,200,0.7);
border-radius:50%;
animation:smokeRise 2s forwards;
}
@keyframes smokeRise{
0%{opacity:0.8;transform:translate(-50%,-50%) scale(1);}
100%{opacity:0;transform:translate(-50%,-120px) scale(3);}
}

/* 🎉 TEXT */
.blastText{
position:fixed;
top:50%;left:50%;
transform:translate(-50%,-50%) scale(0);
font-size:70px;font-weight:bold;
color:#ff6eb4;
text-shadow:0 0 10px #ff6eb4,0 0 20px #ff6eb4,0 0 40px #ff6eb4;
display:none;z-index:999;
animation:pop 1s forwards;
}
@keyframes pop{
0%{transform:translate(-50%,-50%) scale(0);}
60%{transform:translate(-50%,-50%) scale(1.3);}
100%{transform:translate(-50%,-50%) scale(1);}
}

/* CONFETTI */
.confetti{
position:fixed;width:8px;height:8px;top:0;
animation:fall 3s linear forwards;
}
@keyframes fall{
to{transform:translateY(100vh) rotate(360deg);}
}

/* HEART */
.heart{
position:fixed;font-size:20px;top:-20px;
animation:fall 4s linear forwards;
}

/* BALLOON */
.balloon{
position:fixed;bottom:-60px;width:50px;
animation:float 6s linear forwards;
}
@keyframes float{
to{transform:translateY(-120vh);}
}
</style>
</head>

<body>

<audio id="blastSound" src="assets/blast.mp3"></audio>

<!-- ENTRY -->
<div class="page active" id="p0">
<div class="pass-box">
<div id="display" class="display"></div>
<div class="pad">
<button onclick="press(1)">1</button>
<button onclick="press(2)">2</button>
<button onclick="press(3)">3</button>
<button onclick="press(4)">4</button>
<button onclick="press(5)">5</button>
<button onclick="press(6)">6</button>
<button onclick="press(7)">7</button>
<button onclick="press(8)">8</button>
<button onclick="press(9)">9</button>
<button onclick="clearPass()">C</button>
<button onclick="press(0)">0</button>
<button onclick="checkPass()">✔</button>
</div>
</div>
</div>

<!-- ENVELOPE -->
<div class="page" id="p1">
<div class="bg"></div>
<img src="assets/envelope.png" class="envelope" onclick="goTo(2)">
</div>

<!-- LETTER -->
<div class="page" id="p2">
<div class="bg"></div>

<div class="paper">
<img src="assets/paper.png">
<div class="text" id="typing"></div>
</div>

<div>
<button class="btn" onclick="goTo(1)">Back</button>
<button class="btn" onclick="goTo(3)">Next</button>
</div>
</div>

<!-- CAKE -->
<div class="page" id="p3">
<div class="cake-bg"></div>

<div class="cake-box" id="cakeBox">
<img src="assets/cake.png">
<div class="glow" id="glow"></div>
<div class="flame" id="flame"></div>
</div>

<div>
<button class="btn" onclick="goTo(2)">Back</button>
<button class="btn" onclick="blow()">Blow Candle</button>
</div>
</div>

<div id="blastText" class="blastText">HAPPY BIRTHDAY ZNIC 🎉</div>

<script>

/* NAV */
function goTo(n){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById("p"+n).classList.add("active");
if(n===2) startTyping();
}

/* PASSWORD */
let input="";
const display=document.getElementById("display");

function press(n){
if(input.length<5){
input+=n;
display.innerText=input;
}
}
function clearPass(){input="";display.innerText="";}
function checkPass(){
if(input==="81206"){goTo(1);}
else{alert("Wrong Password ❌");clearPass();}
}

/* LETTER */
const msg=`Happy Birthday, Zinc! 🎉✨
Stay bold, stay crazy 😌🔥`;

function startTyping(){
let el=document.getElementById("typing");
el.innerHTML="";
let i=0;
function type(){
if(i<msg.length){
el.innerHTML+=msg[i];
i++;
setTimeout(type,20);
}
}
type();
}

/* 🎉 FINAL BLOW */
function blow(){

document.getElementById("flame").style.display="none";
document.getElementById("glow").style.opacity="0";

/* 💨 SMOKE */
for(let i=0;i<6;i++){
let s=document.createElement("div");
s.className="smoke";
document.getElementById("cakeBox").appendChild(s);
setTimeout(()=>s.remove(),2000);
}

/* 🔊 SOUND */
let sound=document.getElementById("blastSound");
sound.play();
setTimeout(()=>{sound.pause();sound.currentTime=0;},2000);

/* 💖 TEXT */
let t=document.getElementById("blastText");
t.style.display="block";

/* CONFETTI */
for(let i=0;i<60;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.background=`hsl(${Math.random()*360},100%,50%)`;
document.body.appendChild(c);
setTimeout(()=>c.remove(),3000);
}

/* HEARTS */
for(let i=0;i<20;i++){
let h=document.createElement("div");
h.className="heart";
h.innerText="💖";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),4000);
}

/* BALLOONS */
for(let i=0;i<15;i++){
let b=document.createElement("img");
b.src="assets/balloon.png";
b.className="balloon";
b.style.left=Math.random()*100+"vw";
document.body.appendChild(b);
setTimeout(()=>b.remove(),6000);
}

setTimeout(()=>t.style.display="none",2500);
}
</script>

</body>
</html>
