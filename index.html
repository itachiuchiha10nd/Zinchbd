<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HAPPY BIRTHDAY ZNIC 🎉</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Lato&display=swap" rel="stylesheet">

<style>

body{
margin:0;
overflow:hidden;
font-family:'Lato',sans-serif;
}

/* BACKGROUND */
.bg{
position:fixed;
width:100%;
height:100%;
background:url("assets/bg.jpg") no-repeat center/cover;
z-index:-5;
}
.cake-bg{
position:absolute;
width:100%;
height:100%;
background:url("assets/bg2.jpg") no-repeat center/cover;
z-index:-4;
}

/* PAGE */
.page{
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
opacity:0;
transition:0.4s;
pointer-events:none;
}
.page.active{
opacity:1;
pointer-events:auto;
}

/* TITLE */
.title{
font-family:'Dancing Script';
font-size:36px;
color:#ff3d8d;
margin-bottom:20px;
}

/* CAKE */
.cake-box img{
width:350px;
max-width:85vw;
}

/* FLAME */
.flame{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
width:14px;
height:22px;
background:radial-gradient(circle,#fff,#ffd700,orange,red);
border-radius:50%;
animation:flicker 0.15s infinite alternate;
}
.glow{
position:absolute;
top:0;
left:50%;
transform:translateX(-50%);
width:140px;
height:140px;
background:radial-gradient(circle,rgba(255,200,100,0.6),transparent);
border-radius:50%;
animation:glowPulse 1s infinite alternate;
}
@keyframes flicker{
from{transform:translateX(-50%) scale(1);}
to{transform:translateX(-50%) scale(1.2);}
}
@keyframes glowPulse{
from{opacity:0.6;}
to{opacity:1;}
}

/* SMOKE */
.smoke{
position:absolute;
width:10px;
height:10px;
background:gray;
border-radius:50%;
opacity:0.5;
animation:smokeUp 1.5s forwards;
}
@keyframes smokeUp{
to{transform:translateY(-80px);opacity:0;}
}

/* BALLOONS */
.balloon{
position:fixed;
bottom:-60px;
width:60px;
animation:floatUp linear forwards;
}
@keyframes floatUp{
to{transform:translateY(-120vh);}
}

/* FLOWERS */
.flower{
position:fixed;
top:-20px;
animation:fall linear forwards;
}
@keyframes fall{
to{transform:translateY(110vh) rotate(360deg);opacity:0;}
}

/* BLAST PARTICLES */
.blast{
position:fixed;
width:10px;
height:10px;
border-radius:50%;
animation:explode 1s forwards;
}
@keyframes explode{
to{transform:translate(var(--x),var(--y));opacity:0;}
}

/* FIREWORK */
.firework{
position:fixed;
width:6px;
height:6px;
border-radius:50%;
animation:explode 1s forwards;
}

/* TEXT */
.blastText{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:55px;
font-weight:900;
display:none;

background:linear-gradient(45deg,#fff,#ff6eb4,#ff1493);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:0 0 15px pink,0 0 30px hotpink;
z-index:9999;
}

/* BUTTON */
.btn{
margin-top:20px;
padding:10px 22px;
background:#ff6eb4;
color:white;
border:none;
border-radius:20px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="bg"></div>

<!-- AUDIO -->
<audio id="blastSound" src="assets/blast.mp3"></audio>

<!-- PAGE 1 -->
<div class="page active" id="p1">
<div class="title">HAPPY BIRTHDAY ZNIC 🎉</div>
<img src="assets/envelope.png" width="250" onclick="goTo(2)">
</div>

<!-- PAGE 2 -->
<div class="page" id="p2">

<div class="cake-bg"></div>

<div class="cake-box">
<img src="assets/cake.png">
<div class="glow" id="glow"></div>
<div class="flame" id="flame"></div>
</div>

<button class="btn" onclick="blowCandle()">Blow Candle</button>
<div id="nextBtn" style="display:none;">
<button class="btn" onclick="goTo(3)">Next</button>
</div>

</div>

<!-- PAGE 3 -->
<div class="page" id="p3">
<img src="assets/paper.png" width="300">
</div>

<div class="blastText" id="blastText">HAPPY BIRTHDAY ZNIC 🎉</div>

<script>

/* NAV */
function goTo(n){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById("p"+n).classList.add("active");
}

/* 🎂 BLOW */
function blowCandle(){

document.getElementById("flame").style.opacity="0";
document.getElementById("glow").style.opacity="0";

/* 🔊 SOUND */
document.getElementById("blastSound").play();

/* 💨 SMOKE */
for(let i=0;i<5;i++){
let s=document.createElement("div");
s.className="smoke";
s.style.left="50%";
s.style.top="40px";
document.body.appendChild(s);
setTimeout(()=>s.remove(),1500);
}

/* 💥 BLAST */
for(let i=0;i<70;i++){
let b=document.createElement("div");
b.className="blast";
b.style.left="50%";
b.style.top="50%";
b.style.background=`hsl(${Math.random()*360},100%,60%)`;
b.style.setProperty("--x",(Math.random()*500-250)+"px");
b.style.setProperty("--y",(Math.random()*500-250)+"px");
document.body.appendChild(b);
setTimeout(()=>b.remove(),1000);
}

/* 🎆 FIREWORK */
for(let f=0;f<5;f++){
setTimeout(()=>{
for(let i=0;i<20;i++){
let fw=document.createElement("div");
fw.className="firework";
fw.style.left=Math.random()*100+"vw";
fw.style.top=Math.random()*50+"vh";
fw.style.background=`hsl(${Math.random()*360},100%,60%)`;
fw.style.setProperty("--x",(Math.random()*200-100)+"px");
fw.style.setProperty("--y",(Math.random()*200-100)+"px");
document.body.appendChild(fw);
setTimeout(()=>fw.remove(),1000);
}
},f*300);
}

/* TEXT */
let t=document.getElementById("blastText");
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);

/* NEXT */
setTimeout(()=>{
document.getElementById("nextBtn").style.display="block";
},2000);
}

/* 🎈 BALLOONS */
setInterval(()=>{
if(!document.getElementById("p2").classList.contains("active")) return;
let b=document.createElement("img");
b.src="assets/balloon.png";
b.className="balloon";
b.style.left=Math.random()*90+"%";
b.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(b);
setTimeout(()=>b.remove(),10000);
},800);

/* 🌸 FLOWERS */
setInterval(()=>{
let f=document.createElement("div");
f.className="flower";
f.innerText="🌸";
f.style.left=Math.random()*100+"vw";
f.style.fontSize=(18+Math.random()*10)+"px";
f.style.animationDuration=(4+Math.random()*4)+"s";
document.body.appendChild(f);
setTimeout(()=>f.remove(),8000);
},500);

</script>

</body>
</html>
