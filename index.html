<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Playfair+Display&display=swap" rel="stylesheet">

<style>

html{scroll-behavior:smooth;}
body{
margin:0;
font-family:sans-serif;
background:url("assets/bg.jpg") no-repeat center/cover fixed;
}

/* overlay */
body::before{
content:"";
position:fixed;
width:100%;height:100%;
background:rgba(255,240,245,0.35);
backdrop-filter:blur(2px);
z-index:-1;
}

/* page */
.page{
display:none;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}
.page.active{display:flex}

/* 💌 ENVELOPE */
.envelope-box{
position:relative;
text-align:center;
}

.envelope-box img{
width:300px;
cursor:pointer;
transition:0.5s;
}

/* 📜 LETTER SLIDE */
.letter{
position:absolute;
top:20%;
left:50%;
transform:translateX(-50%) translateY(100px);
opacity:0;
transition:1s;
}

.letter img{
width:250px;
}

/* 📖 BOOK */
.book{
width:300px;
height:400px;
position:relative;
perspective:1000px;
}

.page-flip{
width:100%;
height:100%;
position:absolute;
background:#fff;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-family:'Playfair Display';
backface-visibility:hidden;
transition:1s;
}

.page2{
background:#ffe6f0;
transform:rotateY(180deg);
}

.book.open .page1{
transform:rotateY(180deg);
}
.book.open .page2{
transform:rotateY(360deg);
}

/* button */
.btn{
margin-top:20px;
padding:10px 20px;
background:#ff6eb4;
border:none;
border-radius:20px;
color:#fff;
cursor:pointer;
}

</style>
</head>

<body>

<!-- 💌 PAGE 0 -->
<div class="page active" id="p0">

<div class="envelope-box">

<img src="assets/envelope.png" onclick="openEnvelope()">

<div class="letter" id="letter">
<img src="assets/paper.png">
</div>

</div>

</div>

<!-- 📖 PAGE 1 -->
<div class="page" id="p1">

<div class="book" id="book">

<div class="page-flip page1">
Happy Birthday 💖
</div>

<div class="page-flip page2">
You are special 🌸
</div>

</div>

<button class="btn" onclick="flipBook()">Open Book 📖</button>

</div>

<script>

/* envelope open + letter slide */
function openEnvelope(){

let letter = document.getElementById("letter");

letter.style.opacity="1";
letter.style.transform="translateX(-50%) translateY(-120px)";

setTimeout(()=>{
goTo(1);
},1500);
}

/* page switch */
function goTo(n){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById("p"+n).classList.add("active");
}

/* book flip */
function flipBook(){
document.getElementById("book").classList.toggle("open");
}

</script>

</body>
</html>
