<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Letter 💌</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:sans-serif;
overflow:hidden;
}

/* 🌸 SAME BACKGROUND FOR ALL */
.bg{
position:fixed;
width:100%;
height:100%;
background:url("https://i.imgur.com/8Qf6K0H.png");
background-size:cover;
background-position:center;
z-index:-1;
}

/* pages */
.page{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
transition:1s;
}

.hidden{
opacity:0;
pointer-events:none;
}

/* 💌 ENVELOPE */
.envelope{
width:250px;
height:160px;
background:#fff;
position:relative;
border-radius:10px;
cursor:pointer;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.envelope:before{
content:"";
position:absolute;
top:0;
width:100%;
height:100%;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
clip-path:polygon(0 0,100% 0,50% 50%);
}

/* 🎂 CARD */
.card{
background:#fff;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* button */
.btn{
margin-top:20px;
padding:12px 20px;
border:none;
border-radius:20px;
background:#ff6b81;
color:#fff;
cursor:pointer;
}

/* 🎁 gifts */
.gifts{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
}

.gift{
background:#fff;
padding:20px;
border-radius:15px;
font-size:30px;
cursor:pointer;
transition:.3s;
}

.gift:hover{
transform:scale(1.1);
}

/* popup */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.popup-content{
background:#fff;
padding:20px;
border-radius:15px;
max-width:300px;
text-align:center;
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- 💌 PAGE 1 -->
<div class="page" id="p1">
<h2>a love letter to you my love</h2>
<div class="envelope" onclick="next(1)"></div>
</div>

<!-- 🎂 PAGE 2 -->
<div class="page hidden" id="p2">
<div class="card">
<h1>Happy Birthday 💖</h1>
<p>You are special ✨</p>
<button class="btn" onclick="next(2)">Open</button>
</div>
</div>

<!-- 💌 PAGE 3 -->
<div class="page hidden" id="p3">
<div class="card">
<h2>My Letter to You 💌</h2>
<p>You are the best thing in my life... 💖</p>
<button class="btn" onclick="next(3)">🎁 Surprise</button>
</div>
</div>

<!-- 🎁 PAGE 4 -->
<div class="page hidden" id="p4">
<h2>🎁 Your Gifts 🎁</h2>

<div class="gifts">
<div class="gift" onclick="gift('Photo','https://files.catbox.moe/p6mdkp.jpg')">🎁</div>
<div class="gift" onclick="gift('Message','You are amazing 💖')">🎁</div>
<div class="gift" onclick="gift('Audio','audio')">🎁</div>
<div class="gift" onclick="gift('Memory','Best moments ❤️')">🎁</div>
<div class="gift" onclick="gift('Secret','Surprise 😏')">🎁</div>
<div class="gift" onclick="gift('Love','I love you 💕')">🎁</div>
</div>

</div>

<!-- popup -->
<div class="popup" id="pop">
<div class="popup-content" id="content"></div>
</div>

<audio id="audio" src="assets/audio1.mp3"></audio>

<script>

/* next page */
function next(n){
document.getElementById("p"+n).classList.add("hidden");
document.getElementById("p"+(n+1)).classList.remove("hidden");
}

/* gift open */
function gift(title,data){

let pop=document.getElementById("pop");
let box=document.getElementById("content");

if(data==="audio"){
document.getElementById("audio").play();
box.innerHTML=`<h2>${title}</h2><p>🎵 Playing...</p>`;
}
else if(data.startsWith("http")){
box.innerHTML=`<h2>${title}</h2><img src="${data}" style="width:100%">`;
}
else{
box.innerHTML=`<h2>${title}</h2><p>${data}</p>`;
}

pop.style.display="flex";
}

/* close popup */
document.getElementById("pop").onclick=()=>{
pop.style.display="none";
};

</script>

</body>
</html>
