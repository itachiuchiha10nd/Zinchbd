<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAPPY BIRTHDAY ZINC 🎉</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Poppins';}

/* PAGE */
.page{
position:fixed;inset:0;
display:flex;justify-content:center;align-items:center;
flex-direction:column;
opacity:0;pointer-events:none;
transition:.4s;
}
.page.active{opacity:1;pointer-events:auto;}

/* BG */
.bg{position:absolute;inset:0;background:url("assets/bg.jpg") center/cover no-repeat;z-index:-1;}
#p0{background:url("assets/entry-bg.jpg") center/cover no-repeat;}

/* PASSWORD */
.pass-box{
position:absolute;
top:50%;
right:4%;
transform:translateY(-50%);
padding:18px;
background:rgba(255,255,255,0.15);
border-radius:18px;
}

@media(max-width:600px){
.pass-box{
right:50%;
top:65%;
transform:translate(50%,-50%) scale(.9);
}
}

.display{
color:#ff6eb4;
font-size:32px;
letter-spacing:8px;
margin-bottom:15px;
text-align:center;
}

.pad{
display:grid;
grid-template-columns:repeat(3,55px);
gap:10px;
}
.pad button{
padding:12px;border:none;border-radius:10px;
background:#ff6eb4;color:#fff;font-weight:bold;
}

/* ENVELOPE */
.envelope{width:290px;cursor:pointer;}

.open-text{
margin-top:10px;
font-family:'Dancing Script';
font-size:22px;
color:#ff6eb4;
text-shadow:0 0 5px #fff;
}

/* LETTER */
.paper{
position:relative;
width:90vw;max-width:320px;
height:65vh;max-height:450px;
}
.paper img{width:100%;height:100%;}

.text{
position:absolute;
top:15%;left:50%;
transform:translateX(-50%);
width:80%;height:70%;
display:flex;align-items:center;justify-content:center;
text-align:center;
font-family:'Dancing Script';
font-weight:700;
}

/* BUTTON */
.btn{
margin:10px;
padding:10px 20px;
background:#ff6eb4;
border:none;border-radius:20px;
color:#fff;font-weight:bold;
}
.surprise-btn{display:none;}

/* CAKE */
.cake-bg{position:absolute;inset:0;background:url("assets/bg2.jpg") center/cover no-repeat;z-index:-1;}
.cake-box{position:relative;width:240px;}
.cake-box img{width:100%;}

/* FLAME */
.flame{
position:absolute;
top:6%;
left:50%;
transform:translate(-50%,-50%);
width:12px;height:28px;
background:radial-gradient(circle,#fff,#ffd700,orange,red);
border-radius:50%;
animation:flicker .12s infinite alternate;
}
@keyframes flicker{
0%{transform:translate(-50%,-50%) rotate(-6deg);}
100%{transform:translate(-50%,-50%) rotate(6deg) scale(1.2);}
}

/* GLOW */
.glow{
position:absolute;
top:7%;
left:50%;
transform:translate(-50%,-50%);
width:100px;height:100px;
background:radial-gradient(circle,rgba(255,200,100,0.7),transparent);
filter:blur(25px);
}

/* SMOKE */
.smoke{
position:absolute;
top:6%;
left:50%;
width:10px;height:10px;
background:gray;border-radius:50%;
animation:smoke 2s forwards;
}
@keyframes smoke{
to{opacity:0;transform:translate(-50%,-120px) scale(3);}
}

/* BALLOON */
.balloon{position:fixed;width:45px;}

/* FIREWORK */
.firework{
position:fixed;width:6px;height:6px;
border-radius:50%;
animation:boom 1s forwards;
}
@keyframes boom{
to{transform:scale(10);opacity:0;}
}

/* FLOWER */
@keyframes fall{
to{transform:translateY(100vh);opacity:0;}
}

/* BLAST */
.blastText{
position:fixed;
top:50%;left:50%;
transform:translate(-50%,-50%) scale(0);
font-size:60px;
color:#fff;
text-shadow:0 0 10px #ff6eb4;
opacity:0;
}
@keyframes blastPop{
to{transform:translate(-50%,-50%) scale(1);opacity:1;}
}
</style>
</head>

<body>

<!-- 🎵 BG MUSIC -->
<audio id="bgMusic" src="assets/bg.mp3" loop></audio>
<audio id="blastSound" src="assets/blast.mp3"></audio>

<!-- बाकी HTML SAME (no change) -->

<script>

/* 🎵 MUSIC SYSTEM */
const bg=document.getElementById("bgMusic");

window.addEventListener("load",()=>{
let t=localStorage.getItem("bgTime")||0;
bg.currentTime=t;
bg.play().catch(()=>{});
});

setInterval(()=>{
localStorage.setItem("bgTime",bg.currentTime);
},1000);

function pauseBG(){
localStorage.setItem("bgTime",bg.currentTime);
bg.pause();
}

/* 🔥 MODIFY BLOW */
function blow(){

pauseBG(); // 🔥 important

document.getElementById("flame").style.display="none";

/* बाकी tera code same */
}

/* बाकी script same */
</script>

</body>
</html>
