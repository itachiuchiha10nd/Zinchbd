<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HAPPY BIRTHDAY ZNIC 🎉</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Lato&display=swap" rel="stylesheet">

<style>

body{
margin:0;
overflow:hidden;
font-family:'Lato',sans-serif;
}

/* 🌸 BACKGROUND */
.bg{
position:fixed;
width:100%;
height:100%;
background:url("assets/bg.jpg") no-repeat center/cover;
z-index:-3;
}

/* 🌸 FLOWERS */
.flower{
position:fixed;
top:-20px;
animation:fall linear forwards;
pointer-events:none;
z-index:-2;
}
@keyframes fall{
to{transform:translateY(110vh) rotate(360deg);opacity:0;}
}

/* 🎈 BALLOONS */
.balloon{
position:fixed;
bottom:-60px;
width:30px;
height:40px;
border-radius:50%;
animation:floatUp linear forwards;
z-index:-1;
}
.balloon::after{
content:"";
position:absolute;
bottom:-10px;
left:50%;
width:2px;
height:15px;
background:#555;
transform:translateX(-50%);
}
@keyframes floatUp{
to{transform:translateY(-120vh);}
}

/* ✨ LIGHTS */
.lights{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-around;
z-index:2;
}
.bulb{
width:12px;
height:12px;
border-radius:50%;
background:#ff6eb4;
box-shadow:0 0 10px pink,0 0 20px hotpink;
animation:blink 1s infinite alternate;
}
@keyframes blink{
from{opacity:0.5;}
to{opacity:1;}
}

/* PAGE */
.page{
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
opacity:0;
transition:0.5s;
pointer-events:none;
}
.page.active{
opacity:1;
pointer-events:auto;
}

/* TITLE */
.title{
font-family:'Dancing Script',cursive;
font-size:36px;
color:#ff3d8d;
margin-bottom:20px;
}

/* ENVELOPE */
.envelope img{
width:260px;
cursor:pointer;
}

/* 🎂 CAKE */
.cake-box{
position:relative;
}
.cake-box img{
width:240px;
}

/* 🔥 FLAME */
.flame{
position:absolute;
top:22px;
left:50%;
transform:translateX(-50%);
width:12px;
height:18px;
background:radial-gradient(circle,#fff,#ffd700,orange,red);
border-radius:50%;
animation:flicker 0.2s infinite alternate;
z-index:3;
}

/* ✨ GLOW */
.glow{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
width:120px;
height:120px;
background:radial-gradient(circle,rgba(255,200,100,0.5),transparent);
border-radius:50%;
animation:glowPulse 1s infinite alternate;
}

@keyframes flicker{
from{transform:translateX(-50%) scale(1);}
to{transform:translateX(-50%) scale(1.15);}
}
@keyframes glowPulse{
from{opacity:0.6;}
to{opacity:1;}
}

/* 💨 SMOKE */
@keyframes smokeUp{
to{transform:translate(-50%,-40px);opacity:0;}
}

/* BUTTON */
.btn{
margin-top:20px;
padding:10px 22px;
background:#ff6eb4;
border:none;
color:white;
border-radius:20px;
cursor:pointer;
}

/* 🎉 BLAST */
.blast{
position:fixed;
width:8px;
height:8px;
border-radius:50%;
animation:explode 0.8s forwards;
}
@keyframes explode{
to{transform:translate(var(--x),var(--y));opacity:0;}
}

/* 📜 LETTER */
.paper{
position:relative;
width:calc(100vw - 60px);
height:calc(100vh - 150px);
max-width:520px;
max-height:700px;
}
.paper img{
width:100%;
height:100%;
object-fit:contain;
}
.text{
position:absolute;
top:27%;
left:50%;
transform:translateX(-50%);
width:68%;
height:50%;
font-family:'Dancing Script',cursive;
font-size:18px;
text-align:center;
white-space:pre-line;
}

/* POPUP */
.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px 30px;
border-radius:20px;
font-family:'Dancing Script';
font-size:26px;
color:#ff3d8d;
display:none;
}

</style>
</head>

<body>

<div class="bg"></div>

<!-- LIGHTS -->
<div class="lights">
<div class="bulb"></div>
<div class="bulb"></div>
<div class="bulb"></div>
<div class="bulb"></div>
<div class="bulb"></div>
</div>

<!-- PAGE 1 -->
<div class="page active" id="p1">
<div class="title">HAPPY BIRTHDAY ZNIC 🎉</div>
<div class="envelope" onclick="goTo(2)">
<img src="assets/envelope.png">
</div>
<p>Tap to open 💌</p>
</div>

<!-- PAGE 2 🎂 -->
<div class="page" id="p2">

<div class="cake-box">
<img src="assets/cake.png">
<div class="glow" id="glow"></div>
<div class="flame" id="flame"></div>
</div>

<button class="btn" onclick="blowCandle()">Blow Candle 🕯️</button>

<div id="nextBtn" style="display:none;">
<button class="btn" onclick="goTo(3)">Next ➡</button>
</div>

</div>

<!-- PAGE 3 📜 -->
<div class="page" id="p3">

<div class="paper">
<img src="assets/paper.png">
<div class="text" id="typing"></div>
</div>

<button class="btn" onclick="goTo(2)">⬅ Back</button>

</div>

<!-- POPUP -->
<div class="popup" id="popup">Happy Birthday Znic 🎉</div>

<script>

/* NAV */
function goTo(n){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById("p"+n).classList.add("active");
if(n===3) startTyping();
}

/* 🎂 BLOW */
function blowCandle(){
document.getElementById("flame").style.opacity="0";
document.getElementById("glow").style.opacity="0";

/* smoke */
let s=document.createElement("div");
s.style.position="absolute";
s.style.top="20px";
s.style.left="50%";
s.style.transform="translateX(-50%)";
s.style.width="10px";
s.style.height="10px";
s.style.background="gray";
s.style.borderRadius="50%";
s.style.opacity="0.5";
s.style.animation="smokeUp 1s forwards";
document.querySelector(".cake-box").appendChild(s);

/* blast */
for(let i=0;i<25;i++){
let b=document.createElement("div");
b.className="blast";
b.style.left="50%";
b.style.top="50%";
b.style.background=`hsl(${Math.random()*360},100%,60%)`;
b.style.setProperty("--x",(Math.random()*200-100)+"px");
b.style.setProperty("--y",(Math.random()*200-100)+"px");
document.body.appendChild(b);
setTimeout(()=>b.remove(),800);
}

/* popup */
let p=document.getElementById("popup");
p.style.display="block";

setTimeout(()=>{
p.style.display="none";
document.getElementById("nextBtn").style.display="block";
},1500);
}

/* ✍️ TEXT */
const msg=`Happy Birthday, Zinc! 🎉✨

Why I did that? Cuz you're Zinc — you do whatever you want 😌🔥
Stay bold, stay crazy (the good kind), and never let anyone dim that wild energy of yours.
Hope your day is full of chaos, laughter, and exactly the kind of madness you enjoy 😏
Enjoy every moment — you deserve it! 💙🎂`;

let i=0;
function startTyping(){
let el=document.getElementById("typing");
el.innerHTML="";
i=0;
function type(){
if(i<msg.length){
el.innerHTML+=msg.charAt(i);
i++;
setTimeout(type,18);
}
}
type();
}

/* 🌸 FLOWERS */
setInterval(()=>{
let f=document.createElement("div");
f.className="flower";
f.innerText="🌸";
f.style.left=Math.random()*100+"vw";
f.style.fontSize=(18+Math.random()*10)+"px";
f.style.animationDuration=(4+Math.random()*4)+"s";
document.body.appendChild(f);
setTimeout(()=>f.remove(),8000);
},400);

/* 🎈 BALLOONS */
setInterval(()=>{
let b=document.createElement("div");
b.className="balloon";
let colors=["#ff6eb4","#ff85c1","#ff99cc","#ff4da6"];
b.style.background=colors[Math.floor(Math.random()*colors.length)];
b.style.left=Math.random()*100+"vw";
b.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(b);
setTimeout(()=>b.remove(),10000);
},800);

</script>

</body>
</html>
