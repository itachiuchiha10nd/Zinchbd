<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HAPPY BIRTHDAY ZNIC 🎉</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Lato:wght@400;700&display=swap" rel="stylesheet">

<style>

/* RESET */
html,body{
margin:0;
height:100%;
width:100%;
font-family:'Lato',sans-serif;
overflow:hidden;
}

/* BACKGROUND DEFAULT */
body::before{
content:"";
position:fixed;
inset:0;
background:url("assets/bg.jpg") no-repeat center/cover;
z-index:-10;
}

/* PAGE */
.page{
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
opacity:0;
pointer-events:none;
transition:0.4s;
}
.page.active{
opacity:1;
pointer-events:auto;
}

/* ENTRY PAGE */
#p0{
background:url("assets/entry-bg.jpg") no-repeat center/cover;
}

.pass-container{
background:rgba(255,255,255,0.12);
backdrop-filter:blur(15px);
padding:25px;
border-radius:25px;
text-align:center;
box-shadow:0 0 30px rgba(255,105,180,0.4);
}

.display{
font-size:30px;
color:white;
margin-bottom:20px;
}

.pad{
display:grid;
grid-template-columns:repeat(3,65px);
gap:12px;
}

.pad button{
padding:15px;
border:none;
border-radius:50%;
background:#ff6eb4;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

/* ENVELOPE */
.envelope{
width:260px;
cursor:pointer;
transition:0.3s;
}
.envelope:hover{
transform:scale(1.1);
}

/* LETTER */
.paper{
position:relative;
width:320px;
}
.paper img{
width:100%;
}
.text{
position:absolute;
top:28%;
left:50%;
transform:translateX(-50%);
width:72%;
font-family:'Dancing Script';
font-size:18px;
color:#000;
text-align:center;
white-space:pre-line;
}

/* BUTTON */
.btn{
margin-top:20px;
padding:12px 24px;
background:#ff6eb4;
border:none;
border-radius:25px;
color:white;
font-weight:bold;
cursor:pointer;
}

/* CAKE BG */
.cake-bg{
position:absolute;
inset:0;
background:url("assets/bg2.jpg") no-repeat center/cover;
z-index:-1;
}

/* CAKE */
.cake-box img{
width:340px;
}

/* FLAME */
.flame{
position:absolute;
top:12%;
left:50%;
transform:translate(-50%,-50%);
width:14px;
height:22px;
background:radial-gradient(circle,#fff,#ffd700,orange,red);
border-radius:50%;
animation:flicker 0.15s infinite alternate;
}
.glow{
position:absolute;
top:10%;
left:50%;
transform:translate(-50%,-50%);
width:160px;
height:160px;
background:radial-gradient(circle,rgba(255,220,120,0.6),transparent);
border-radius:50%;
}

/* FLOWERS */
.flower{
position:fixed;
top:-20px;
animation:fall linear forwards;
}
@keyframes fall{
to{transform:translateY(110vh);}
}

/* BALLOON */
.balloon{
position:fixed;
bottom:-50px;
width:60px;
animation:floatUp linear forwards;
}
@keyframes floatUp{
to{transform:translateY(-120vh);}
}

/* BLAST TEXT */
.blastText{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:50px;
font-weight:bold;
background:linear-gradient(45deg,#fff,#ff6eb4);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
display:none;
}

</style>
</head>

<body>

<audio id="blastSound" src="assets/blast.mp3"></audio>

<!-- ENTRY -->
<div class="page active" id="p0">
<div class="pass-container">
<div id="display"></div>

<div class="pad">
<button onclick="press(1)">1</button>
<button onclick="press(2)">2</button>
<button onclick="press(3)">3</button>
<button onclick="press(4)">4</button>
<button onclick="press(5)">5</button>
<button onclick="press(6)">6</button>
<button onclick="press(7)">7</button>
<button onclick="press(8)">8</button>
<button onclick="press(9)">9</button>
<button onclick="clearPass()">C</button>
<button onclick="press(0)">0</button>
<button onclick="checkPass()">✔</button>
</div>
</div>
</div>

<!-- ENVELOPE -->
<div class="page" id="p1">
<img src="assets/envelope.png" class="envelope" onclick="goTo(2)">
</div>

<!-- LETTER -->
<div class="page" id="p2">
<div class="paper">
<img src="assets/paper.png">
<div class="text" id="typing"></div>
</div>
<button class="btn" onclick="goTo(3)">Next 🎂</button>
</div>

<!-- CAKE -->
<div class="page" id="p3">
<div class="cake-bg"></div>

<div class="cake-box">
<img src="assets/cake.png">
<div class="glow" id="glow"></div>
<div class="flame" id="flame"></div>
</div>

<button class="btn" onclick="blow()">Blow Candle</button>
</div>

<div class="blastText" id="blastText">HAPPY BIRTHDAY ZNIC 🎉</div>

<script>

/* NAV */
function goTo(n){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById("p"+n).classList.add("active");
if(n===2) startTyping();
}

/* PASSWORD */
let input="";
function press(n){
input+=n;
document.getElementById("display").innerText=input;
}
function clearPass(){
input="";
document.getElementById("display").innerText="";
}
function checkPass(){
if(input==="81206"){
goTo(1);
}else{
alert("Wrong Password ❌");
clearPass();
}
}

/* FLOWERS */
setInterval(()=>{
let f=document.createElement("div");
f.className="flower";
f.innerText="🌸";
f.style.left=Math.random()*100+"vw";
f.style.animationDuration="6s";
document.body.appendChild(f);
setTimeout(()=>f.remove(),6000);
},600);

/* BALLOONS ONLY CAKE */
setInterval(()=>{
if(!document.getElementById("p3").classList.contains("active")) return;

let b=document.createElement("img");
b.src="assets/balloon.png";
b.className="balloon";
b.style.left=Math.random()*100+"%";
b.style.animationDuration="6s";
document.body.appendChild(b);
setTimeout(()=>b.remove(),6000);
},800);

/* LETTER TEXT */
const msg=`Happy Birthday, Zinc! 🎉✨

Stay bold, stay crazy 😌🔥

Enjoy every moment 💙🎂`;

function startTyping(){
let el=document.getElementById("typing");
el.innerHTML="";
let i=0;
function type(){
if(i<msg.length){
el.innerHTML+=msg.charAt(i);
i++;
setTimeout(type,20);
}
}
type();
}

/* BLOW */
function blow(){
document.getElementById("flame").style.display="none";
document.getElementById("glow").style.display="none";

let s=document.getElementById("blastSound");
s.play();

setTimeout(()=>{
s.pause();
s.currentTime=0;
},2000);

let t=document.getElementById("blastText");
t.style.display="block";

setTimeout(()=>t.style.display="none",2000);
}

</script>

</body>
</html>
