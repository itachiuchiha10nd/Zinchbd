<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAPPY BIRTHDAY ZNIC 🎉</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;font-family:'Poppins';}

/* PAGE SYSTEM */
.page{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:.4s;
}
.page.active{
opacity:1;
pointer-events:auto;
}

/* ENTRY PAGE */
#p0{
background:url("assets/entry-bg.jpg") center/cover no-repeat;
}
.pass-box{
position:absolute;
right:6%;
top:50%;
transform:translateY(-50%);
padding:25px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
border-radius:20px;
}
.display{
color:#ff6eb4;
font-size:36px;
font-weight:bold;
letter-spacing:8px;
margin-bottom:20px;
text-shadow:0 0 10px #ff6eb4,0 0 20px #ff6eb4,0 0 40px #ff6eb4;
}
.pad{
display:grid;
grid-template-columns:repeat(3,70px);
gap:10px;
}
.pad button{
padding:15px;
border:none;
border-radius:15px;
background:#ff6eb4;
color:#fff;
font-size:20px;
font-weight:bold;
cursor:pointer;
}

/* COMMON BG */
.bg{
position:absolute;
inset:0;
background:url("assets/bg.jpg") center/cover no-repeat;
z-index:-1;
}

/* ENVELOPE */
.envelope{
width:250px;
cursor:pointer;
}

/* LETTER */
.paper{
position:relative;
width:320px;
}
.paper img{width:100%;}
.text{
position:absolute;
top:25%;
left:50%;
transform:translateX(-50%);
width:70%;
font-family:'Dancing Script';
font-size:18px;
text-align:center;
color:#000;
}

/* BUTTON */
.btn{
margin:10px;
padding:12px 25px;
background:#ff6eb4;
border:none;
border-radius:25px;
color:white;
font-weight:bold;
cursor:pointer;
}

/* CAKE */
.cake-bg{
position:absolute;
inset:0;
background:url("assets/bg2.jpg") center/cover no-repeat;
z-index:-1;
}
.cake-box{
position:relative;
}
.cake-box img{width:280px;}

.flame{
position:absolute;
top:12%;
left:50%;
transform:translate(-50%,-50%);
width:12px;
height:20px;
background:orange;
border-radius:50%;
}

.glow{
position:absolute;
top:10%;
left:50%;
transform:translate(-50%,-50%);
width:120px;
height:120px;
background:radial-gradient(circle,rgba(255,200,100,0.6),transparent);
}

/* BLAST */
.blastText{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
font-size:55px;
font-weight:bold;
background:radial-gradient(circle,#ff6eb4,#000);
color:white;
display:none;
z-index:999;
}
</style>
</head>

<body>

<audio id="blastSound" src="assets/blast.mp3"></audio>

<!-- ENTRY -->
<div class="page active" id="p0">
<div class="pass-box">
<div id="display" class="display"></div>

<div class="pad">
<button onclick="press(1)">1</button>
<button onclick="press(2)">2</button>
<button onclick="press(3)">3</button>
<button onclick="press(4)">4</button>
<button onclick="press(5)">5</button>
<button onclick="press(6)">6</button>
<button onclick="press(7)">7</button>
<button onclick="press(8)">8</button>
<button onclick="press(9)">9</button>
<button onclick="clearPass()">C</button>
<button onclick="press(0)">0</button>
<button onclick="checkPass()">✔</button>
</div>
</div>
</div>

<!-- ENVELOPE -->
<div class="page" id="p1">
<div class="bg"></div>
<img src="assets/envelope.png" class="envelope" onclick="goTo(2)">
</div>

<!-- LETTER -->
<div class="page" id="p2">
<div class="bg"></div>

<div class="paper">
<img src="assets/paper.png">
<div class="text" id="typing"></div>
</div>

<div>
<button class="btn" onclick="goTo(1)">⬅ Back</button>
<button class="btn" onclick="goTo(3)">Next 🎂</button>
</div>
</div>

<!-- CAKE -->
<div class="page" id="p3">
<div class="cake-bg"></div>

<div class="cake-box">
<img src="assets/cake.png">
<div class="glow" id="glow"></div>
<div class="flame" id="flame"></div>
</div>

<div>
<button class="btn" onclick="goTo(2)">⬅ Back</button>
<button class="btn" onclick="blow()">Blow Candle</button>
</div>
</div>

<div id="blastText" class="blastText">HAPPY BIRTHDAY ZNIC 🎉</div>

<script>

/* NAV */
function goTo(n){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById("p"+n).classList.add("active");

if(n===2) startTyping();
}

/* PASSWORD */
let input="";
const display=document.getElementById("display");

function press(n){
if(input.length<5){
input+=n;
display.innerText=input;
}
}
function clearPass(){
input="";
display.innerText="";
}
function checkPass(){
if(input==="81206"){
goTo(1);
}else{
alert("Wrong Password ❌");
clearPass();
}
}

/* LETTER */
const msg=`Happy Birthday, Zinc! 🎉✨
Why I did that? Cuz you're Zinc 😌🔥
Stay bold, stay crazy 💙`;

function startTyping(){
let el=document.getElementById("typing");
el.innerHTML="";
let i=0;
function type(){
if(i<msg.length){
el.innerHTML+=msg[i];
i++;
setTimeout(type,20);
}
}
type();
}

/* BLOW */
function blow(){
document.getElementById("flame").style.display="none";
document.getElementById("glow").style.display="none";

document.getElementById("blastSound").play();

let t=document.getElementById("blastText");
t.style.display="flex";

setTimeout(()=>{t.style.display="none";},2500);
}

</script>

</body>
</html>
