<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HAPPY BIRTHDAY ZNIC 🎉</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500&family=Lato&display=swap" rel="stylesheet">

<style>

/* BODY */
body{
margin:0;
font-family:'Lato',sans-serif;
background:#fff0f5;
overflow:hidden;
}

/* 🌸 FLOWER BACKGROUND */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:url("assets/bg.jpg") repeat;
background-size:250px;
opacity:0.25;
z-index:-2;
}

/* blur layer */
body::after{
content:"";
position:fixed;
width:100%;
height:100%;
background:rgba(255,255,255,0.6);
backdrop-filter:blur(4px);
z-index:-1;
}

/* PAGES */
.page{
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
opacity:0;
transition:0.6s;
pointer-events:none;
}

.page.active{
opacity:1;
pointer-events:auto;
}

/* TITLE */
.title{
font-family:'Dancing Script',cursive;
font-size:36px;
margin-bottom:20px;
color:#ff4d8d;
}

/* ENVELOPE */
.envelope img{
width:260px;
cursor:pointer;
transition:0.3s;
}
.envelope img:hover{
transform:scale(1.05);
}

/* 📜 BIG LETTER */
.paper{
position:relative;

/* 🔥 BIG SIZE (screen - gap) */
width:calc(100vw - 60px);
height:calc(100vh - 160px);

max-width:550px;
max-height:700px;
}

.paper img{
width:100%;
height:100%;
object-fit:contain;
}

/* ✍️ TEXT AREA */
.text{
position:absolute;

top:28%;
left:50%;
transform:translateX(-50%);

width:65%;
height:48%;

font-family:'Dancing Script',cursive;
font-size:20px;
line-height:1.6;
color:#5a3e3e;
text-align:center;

overflow:hidden;
white-space:pre-line;
}

/* BUTTONS */
.btn-group{
display:flex;
gap:15px;
margin-top:15px;
}

.btn{
padding:10px 22px;
background:#ff6eb4;
border:none;
color:white;
border-radius:20px;
cursor:pointer;
font-size:14px;
}

</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="page active" id="p1">

<div class="title">HAPPY BIRTHDAY ZNIC 🎉</div>

<div class="envelope" onclick="goTo(2)">
<img src="assets/envelope.png">
</div>

<p>Tap to open 💌</p>

</div>

<!-- PAGE 2 -->
<div class="page" id="p2">

<div class="paper">

<img src="assets/paper1.png">

<div class="text" id="typing"></div>

</div>

<div class="btn-group">
<button class="btn" onclick="goTo(1)">⬅ Back</button>
<button class="btn" onclick="goTo(3)">Next ➡</button>
</div>

</div>

<!-- PAGE 3 -->
<div class="page" id="p3">
<h2>Next Surprise 😏✨</h2>

<div class="btn-group">
<button class="btn" onclick="goTo(2)">⬅ Back</button>
</div>

</div>

<script>

/* PAGE SWITCH */
function goTo(n){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById("p"+n).classList.add("active");

if(n===2) startTyping();
}

/* ✍️ FAST TYPING EFFECT */
const text = `Happy Birthday, Zinc! 🎉✨

Why I did that? Cuz you're Zinc — you do whatever you want 😌🔥

Stay bold, stay crazy (the good kind), and never let anyone dim that wild energy of yours.

Hope your day is full of chaos, laughter, and exactly the kind of madness you enjoy 😏

Enjoy every moment — you deserve it! 💙🎂`;

let i = 0;

function startTyping(){
const el = document.getElementById("typing");
el.innerHTML = "";
i = 0;

const speed = 20; // ⚡ fast

function type(){
if(i < text.length){
el.innerHTML += text.charAt(i);
i++;
setTimeout(type, speed);
}
}
type();
}

</script>

</body>
</html>
