<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HAPPY BIRTHDAY ZNIC 🎉</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Lato&display=swap" rel="stylesheet">

<style>

/* BODY */
body{
margin:0;
font-family:'Lato',sans-serif;
overflow:hidden;
}

/* 🌸 BACKGROUND IMAGE (NO BLUR) */
.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("assets/bg.jpg") no-repeat center center;
background-size:cover;
z-index:-2;
}

/* 🌸 FLOWER EFFECT */
.flower{
position:fixed;
top:-20px;
pointer-events:none;
animation:fall linear forwards;
z-index:-1;
}

@keyframes fall{
0%{transform:translateY(0) rotate(0deg);opacity:1;}
100%{transform:translateY(110vh) rotate(360deg);opacity:0;}
}

/* PAGE */
.page{
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
opacity:0;
transition:0.5s;
pointer-events:none;
}

.page.active{
opacity:1;
pointer-events:auto;
}

/* TITLE */
.title{
font-family:'Dancing+Script',cursive;
font-size:38px;
color:#ff3d8d;
margin-bottom:20px;
}

/* ENVELOPE */
.envelope img{
width:260px;
cursor:pointer;
transition:0.3s;
}
.envelope img:hover{
transform:scale(1.05);
}

/* 📜 LETTER */
.paper{
position:relative;
width:calc(100vw - 60px);
height:calc(100vh - 150px);
max-width:520px;
max-height:700px;
}

.paper img{
width:100%;
height:100%;
object-fit:contain;
}

/* ✍️ TEXT */
.text{
position:absolute;
top:27%;
left:50%;
transform:translateX(-50%);
width:65%;
height:50%;

font-family:'Dancing Script',cursive;
font-size:24px; /* 🔥 bigger font */
line-height:1.6;
color:#5a3e3e;
text-align:center;

white-space:pre-line;
overflow:hidden;
}

/* BUTTONS */
.btn-group{
display:flex;
gap:15px;
margin-top:15px;
}

.btn{
padding:10px 22px;
background:#ff6eb4;
border:none;
color:white;
border-radius:20px;
cursor:pointer;
font-size:15px;
}

</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="bg"></div>

<!-- PAGE 1 -->
<div class="page active" id="p1">

<div class="title">HAPPY BIRTHDAY ZNIC 🎉</div>

<div class="envelope" onclick="goTo(2)">
<img src="assets/envelope.png">
</div>

<p>Tap to open 💌</p>

</div>

<!-- PAGE 2 -->
<div class="page" id="p2">

<div class="paper">

<img src="assets/paper.png">

<div class="text" id="typing"></div>

</div>

<div class="btn-group">
<button class="btn" onclick="goTo(1)">⬅ Back</button>
</div>

</div>

<script>

/* PAGE SWITCH */
function goTo(n){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById("p"+n).classList.add("active");

if(n===2) startTyping();
}

/* TEXT */
const message = `Happy Birthday, Zinc! 🎉✨

Why I did that? Cuz you're Zinc — you do whatever you want 😌🔥

Stay bold, stay crazy (the good kind), and never let anyone dim that wild energy of yours.

Hope your day is full of chaos, laughter, and exactly the kind of madness you enjoy 😏

Enjoy every moment — you deserve it! 💙🎂`;

let i=0;

/* ✍️ FAST TYPING */
function startTyping(){
const el=document.getElementById("typing");
el.innerHTML="";
i=0;

function type(){
if(i < message.length){
el.innerHTML += message.charAt(i);
i++;
setTimeout(type,18); /* ⚡ fast */
}
}
type();
}

/* 🌸 FLOWERS */
setInterval(()=>{
let f=document.createElement("div");
f.className="flower";
f.innerText="🌸";

f.style.left=Math.random()*100+"vw";
f.style.fontSize=(18+Math.random()*12)+"px";
f.style.animationDuration=(4+Math.random()*4)+"s";

document.body.appendChild(f);

setTimeout(()=>f.remove(),8000);

},350);

</script>

</body>
</html>
