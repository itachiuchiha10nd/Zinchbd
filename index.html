<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAPPY BIRTHDAY ZINC 🎉</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;font-family:'Poppins';}

.page{
position:fixed;inset:0;
display:flex;flex-direction:column;
justify-content:center;align-items:center;
opacity:0;pointer-events:none;
transition:.4s;
}
.page.active{opacity:1;pointer-events:auto;}

.bg{position:absolute;inset:0;background:url("/Zinchbd/assets/bg.jpg") center/cover no-repeat;z-index:-1;}
#p0{background:url("/Zinchbd/assets/entry-bg.jpg") center/cover no-repeat;}

.pass-box{
position:absolute;top:50%;right:5%;
transform:translateY(-50%);
padding:18px;
background:rgba(255,255,255,0.2);
border-radius:15px;
}

.display{
color:#ff6eb4;
font-size:30px;
text-align:center;
margin-bottom:10px;
}

.pad{display:grid;grid-template-columns:repeat(3,50px);gap:10px;}
.pad button{
padding:10px;border:none;border-radius:10px;
background:#ff6eb4;color:#fff;
}

.envelope{width:260px;cursor:pointer;}
.open-text{
font-family:'Dancing Script';
color:#ff6eb4;
font-size:22px;
margin-top:10px;
}

.paper{position:relative;width:90vw;max-width:320px;height:65vh;}
.paper img{width:100%;height:100%;}

.text{
position:absolute;
top:15%;left:50%;
transform:translateX(-50%);
width:80%;height:70%;
display:flex;justify-content:center;align-items:center;
text-align:center;
font-family:'Dancing Script';
font-weight:bold;
}

.btn{
margin:10px;padding:10px 20px;
background:#ff6eb4;color:#fff;
border:none;border-radius:20px;
}

.cake-box{position:relative;width:220px;}
.cake-box img{width:100%;}

.flame{
position:absolute;
top:5%;left:50%;
transform:translate(-50%,-50%);
width:12px;height:25px;
background:orange;border-radius:50%;
animation:flicker .1s infinite alternate;
}
@keyframes flicker{
0%{transform:translate(-50%,-50%) rotate(-5deg);}
100%{transform:translate(-50%,-50%) rotate(5deg);}
}

.glow{
position:absolute;top:5%;left:50%;
transform:translate(-50%,-50%);
width:80px;height:80px;
background:radial-gradient(circle,rgba(255,200,0,.7),transparent);
filter:blur(20px);
}

.smoke{
position:absolute;
top:5%;left:50%;
width:10px;height:10px;
background:gray;border-radius:50%;
animation:smoke 2s forwards;
}
@keyframes smoke{
to{opacity:0;transform:translate(-50%,-120px) scale(3);}
}

.balloon{position:fixed;width:40px;}

.blast{
position:fixed;
top:50%;left:50%;
transform:translate(-50%,-50%);
font-size:40px;
color:#ff6eb4,#ff1493;
text-shadow:0 0 10px #ff6eb4;
display:none;
}
</style>
</head>

<body>

<audio id="bgMusic" src="/Zinchbd/assets/bg.mp3" loop></audio>
<audio id="blastSound" src="/Zinchbd/assets/blast.mp3"></audio>

<!-- PASSWORD -->
<div class="page active" id="p0">
<div class="pass-box">
<div id="display" class="display"></div>
<div class="pad">
<button onclick="press(1)">1</button>
<button onclick="press(2)">2</button>
<button onclick="press(3)">3</button>
<button onclick="press(4)">4</button>
<button onclick="press(5)">5</button>
<button onclick="press(6)">6</button>
<button onclick="press(7)">7</button>
<button onclick="press(8)">8</button>
<button onclick="press(9)">9</button>
<button onclick="clearPass()">C</button>
<button onclick="press(0)">0</button>
<button onclick="checkPass()">✔</button>
</div>
</div>
</div>

<!-- ENVELOPE -->
<div class="page" id="p1">
<div class="bg"></div>
<img src="/Zinchbd/assets/envelope.png" class="envelope" onclick="goTo(2)">
<div class="open-text">Open it 💌</div>
</div>

<!-- LETTER -->
<div class="page" id="p2">
<div class="bg"></div>
<div class="paper">
<img src="/Zinchbd/assets/paper.png">
<div class="text" id="typing"></div>
</div>
<button class="btn" onclick="goTo(3)">Next</button>
</div>

<!-- CAKE -->
<div class="page" id="p3">
<div class="bg"></div>

<div class="cake-box" id="cake">
<img src="/Zinchbd/assets/cake.png">
<div class="glow"></div>
<div class="flame" id="flame"></div>
</div>

<button class="btn" onclick="blow()">Blow Candle</button>
<button id="surpriseBtn" class="btn" style="display:none;" onclick="window.location.href='video.html'">SURPRISE 💗</button>
</div>

<div id="blast" class="blast">HAPPY BIRTHDAY ZINC 🎉</div>

<script>

/* MUSIC */
let bg;
let started=false;

window.addEventListener("load",()=>{
bg=document.getElementById("bgMusic");
let t=localStorage.getItem("bgTime")||0;
bg.currentTime=t;
});

function startBG(){
if(!started){
started=true;
bg.play().catch(()=>{});
}
}

/* PASSWORD */
let input="";
let display=document.getElementById("display");

function press(n){
if(input.length<5){
input+=n;
display.innerText=input;
}
}

function clearPass(){
input="";
display.innerText="";
}

function checkPass(){
if(input==="81206"){
startBG();
goTo(1);
}else{
alert("Wrong Password");
clearPass();
}
}

/* NAV */
function goTo(n){
let next=document.getElementById("p"+n);
if(!next) return;

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
next.classList.add("active");

if(n===2) startTyping();
if(n===3) startBalloons();
}

/* LETTER */
const msg=`Happy Birthday, Zinc! 🎉✨ Always stay happy, keep smiling, and enjoy your day to the fullest 😄 Be truly happy, because you deserve all the good things in life. And thank you for coming into my life and becoming my friend — it really means a lot to me 🤝 I also hope you always stay as beautiful as you are ✨ Just a little wish from my side 😆 I hope we stay together at least until my birthday 😂 Once again, Happy Birthday! 🎂🎈 Stay amazing ✨ -Akarsh❤️`;

function autoFit(el){
let size=24;
el.style.fontSize=size+"px";
while(el.scrollHeight>el.clientHeight && size>10){
size--;
el.style.fontSize=size+"px";
}
}

function startTyping(){
let el=document.getElementById("typing");
el.innerHTML="";
let i=0;

function type(){
if(i<msg.length){
el.innerHTML+=msg[i++];
setTimeout(type,10);
}else autoFit(el);
}
type();
}

/* BALLOONS */
function startBalloons(){
for(let i=0;i<5;i++){
let b=document.createElement("img");
b.src="/Zinchbd/assets/balloon.png";
b.className="balloon";
document.body.appendChild(b);

setInterval(()=>{
b.style.left=Math.random()*100+"vw";
b.style.top=Math.random()*100+"vh";
},3000);
}
}

/* FLOWERS */
setInterval(()=>{
let f=document.createElement("div");
f.innerHTML="🌸";
f.style.position="fixed";
f.style.left=Math.random()*100+"vw";
f.style.top="-20px";
f.style.animation="fall 4s linear";
document.body.appendChild(f);
setTimeout(()=>f.remove(),4000);
},800);

/* BLOW */
function blow(){
bg.pause();

document.getElementById("flame").style.display="none";

for(let i=0;i<3;i++){
let s=document.createElement("div");
s.className="smoke";
document.getElementById("cake").appendChild(s);
setTimeout(()=>s.remove(),2000);
}

document.getElementById("blastSound").play();

let b=document.getElementById("blast");
b.style.display="block";
setTimeout(()=>b.style.display="none",2000);

document.getElementById("surpriseBtn").style.display="inline-block";
}

</script>

</body>
</html>
