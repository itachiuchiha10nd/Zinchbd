<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HAPPY BIRTHDAY ZNIC 🎉</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@600&display=swap" rel="stylesheet">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;}

/* PAGE SYSTEM */
.page{
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:0.5s;
}
.page.active{
opacity:1;
pointer-events:auto;
}

/* ========= ENTRY PAGE ========= */
#p0{
background:url("assets/entry-bg.jpg") no-repeat center/cover;
display:flex;
justify-content:flex-end;
align-items:center;
}

.pass-box{
margin-right:5%;
padding:25px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
border-radius:20px;
box-shadow:0 0 25px rgba(255,105,180,0.4);
}

.display{
color:white;
font-size:32px;
text-align:center;
margin-bottom:15px;
text-shadow:0 0 10px #ff6eb4;
}

.pad{
display:grid;
grid-template-columns:repeat(3,70px);
gap:10px;
}

.pad button{
padding:15px;
border:none;
border-radius:15px;
background:#ff6eb4;
color:white;
font-size:20px;
font-weight:bold;
box-shadow:0 0 15px #ff6eb4;
cursor:pointer;
}

/* ========= COMMON BG ========= */
.bg{
position:absolute;
inset:0;
background:url("assets/bg.jpg") center/cover no-repeat;
z-index:-1;
}

/* ========= ENVELOPE ========= */
.envelope{
width:260px;
cursor:pointer;
transition:0.3s;
}
.envelope:hover{transform:scale(1.1);}

/* ========= LETTER ========= */
.paper{
position:relative;
width:330px;
}
.paper img{width:100%;}
.text{
position:absolute;
top:28%;
left:50%;
transform:translateX(-50%);
width:72%;
font-family:'Dancing Script';
font-size:18px;
text-align:center;
color:#000;
}

/* ========= BUTTON ========= */
.btn{
margin-top:20px;
padding:12px 25px;
background:#ff6eb4;
border:none;
border-radius:25px;
color:white;
font-weight:bold;
cursor:pointer;
}

/* ========= CAKE PAGE ========= */
.cake-bg{
position:absolute;
inset:0;
background:url("assets/bg2.jpg") center/cover no-repeat;
z-index:-1;
}

.cake-box{
position:relative;
}
.cake-box img{
width:350px;
}

/* CANDLE */
.flame{
position:absolute;
top:12%;
left:50%;
transform:translate(-50%,-50%);
width:14px;
height:22px;
background:radial-gradient(circle,#fff,#ffd700,orange,red);
border-radius:50%;
animation:flicker 0.15s infinite alternate;
}

.glow{
position:absolute;
top:10%;
left:50%;
transform:translate(-50%,-50%);
width:150px;
height:150px;
background:radial-gradient(circle,rgba(255,200,100,0.6),transparent);
}

/* FLOWERS */
.flower{
position:fixed;
top:-20px;
font-size:20px;
animation:fall 6s linear forwards;
}
@keyframes fall{
to{transform:translateY(110vh);}
}

/* BALLOONS */
.balloon{
position:fixed;
bottom:-60px;
width:60px;
animation:floatUp 6s linear forwards;
}
@keyframes floatUp{
to{transform:translateY(-120vh);}
}

/* BLAST TEXT */
.blastText{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:50px;
font-weight:bold;
background:linear-gradient(45deg,#fff,#ff6eb4);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
display:none;
}

</style>
</head>

<body>

<audio id="blastSound" src="assets/blast.mp3"></audio>

<!-- PAGE 0 ENTRY -->
<div class="page active" id="p0">
<div class="pass-box">
<div id="display"></div>

<div class="pad">
<button onclick="press(1)">1</button>
<button onclick="press(2)">2</button>
<button onclick="press(3)">3</button>
<button onclick="press(4)">4</button>
<button onclick="press(5)">5</button>
<button onclick="press(6)">6</button>
<button onclick="press(7)">7</button>
<button onclick="press(8)">8</button>
<button onclick="press(9)">9</button>
<button onclick="clearPass()">C</button>
<button onclick="press(0)">0</button>
<button onclick="checkPass()">✔</button>
</div>
</div>
</div>

<!-- PAGE 1 ENVELOPE -->
<div class="page" id="p1">
<div class="bg"></div>
<img src="assets/envelope.png" class="envelope" onclick="goTo(2)">
</div>

<!-- PAGE 2 LETTER -->
<div class="page" id="p2">
<div class="bg"></div>

<div class="paper">
<img src="assets/paper.png">
<div class="text" id="typing"></div>
</div>

<button class="btn" onclick="goTo(3)">Next 🎂</button>
</div>

<!-- PAGE 3 CAKE -->
<div class="page" id="p3">
<div class="cake-bg"></div>

<div class="cake-box">
<img src="assets/cake.png">
<div class="glow" id="glow"></div>
<div class="flame" id="flame"></div>
</div>

<button class="btn" onclick="blow()">Blow Candle</button>
</div>

<div class="blastText" id="blastText">HAPPY BIRTHDAY ZNIC 🎉</div>

<script>

/* NAVIGATION */
function goTo(n){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById("p"+n).classList.add("active");
if(n===2) startTyping();
}

/* PASSWORD */
let input="";
function press(n){
if(input.length<5){
input+=n;
document.getElementById("display").innerText=input;
}
}
function clearPass(){
input="";
document.getElementById("display").innerText="";
}
function checkPass(){
if(input==="81206"){
goTo(1);
}else{
alert("Wrong Password ❌");
clearPass();
}
}

/* FLOWERS */
setInterval(()=>{
let f=document.createElement("div");
f.className="flower";
f.innerText="🌸";
f.style.left=Math.random()*100+"vw";
document.body.appendChild(f);
setTimeout(()=>f.remove(),6000);
},600);

/* BALLOONS ONLY CAKE */
setInterval(()=>{
if(!document.getElementById("p3").classList.contains("active")) return;

let b=document.createElement("img");
b.src="assets/balloon.png";
b.className="balloon";
b.style.left=Math.random()*100+"%";
document.body.appendChild(b);
setTimeout(()=>b.remove(),6000);
},800);

/* LETTER */
const msg=`Happy Birthday, Zinc! 🎉✨

Why I did that? Cuz you're Zinc 😌🔥

Stay bold, stay crazy 💙`;

function startTyping(){
let el=document.getElementById("typing");
el.innerHTML="";
let i=0;
function type(){
if(i<msg.length){
el.innerHTML+=msg.charAt(i);
i++;
setTimeout(type,20);
}
}
type();
}

/* BLOW */
function blow(){
document.getElementById("flame").style.display="none";
document.getElementById("glow").style.display="none";

let s=document.getElementById("blastSound");
s.play();

setTimeout(()=>{
s.pause();
s.currentTime=0;
},2000);

let t=document.getElementById("blastText");
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

</script>

</body>
</html>
