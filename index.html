<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAPPY BIRTHDAY ZINC 🎉</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@700&display=swap" rel="stylesheet">

<style>
/* (⚠️ ALL YOUR ORIGINAL CSS SAME — NO CHANGE) */
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Poppins';}

/* PAGE */
.page{
position:fixed;inset:0;
display:flex;justify-content:center;align-items:center;
flex-direction:column;
opacity:0;pointer-events:none;
transition:.4s;
}
.page.active{opacity:1;pointer-events:auto;}

.bg{position:absolute;inset:0;background:url("/Zinchbd/assets/bg.jpg") center/cover no-repeat;z-index:-1;}
#p0{background:url("/Zinchbd/assets/entry-bg.jpg") center/cover no-repeat;}

.pass-box{
position:absolute;
top:50%;
right:4%;
transform:translateY(-50%);
padding:18px;
background:rgba(255,255,255,0.15);
border-radius:18px;
}

.display{
color:#ff6eb4;
font-size:32px;
letter-spacing:8px;
margin-bottom:15px;
text-align:center;
}

.pad{
display:grid;
grid-template-columns:repeat(3,55px);
gap:10px;
}
.pad button{
padding:12px;border:none;border-radius:10px;
background:#ff6eb4;color:#fff;font-weight:bold;
}

/* बाकी CSS SAME (short किया readability के लिए) */
</style>
</head>

<body>

<!-- 🎵 BG MUSIC -->
<audio id="bgMusic" src="/Zinchbd/assets/bg.mp3" loop></audio>
<audio id="blastSound" src="/Zinchbd/assets/blast.mp3"></audio>

<!-- ENTRY -->
<div class="page active" id="p0">
<div class="pass-box">
<div id="display" class="display"></div>
<div class="pad">
<button onclick="press(1)">1</button><button onclick="press(2)">2</button><button onclick="press(3)">3</button>
<button onclick="press(4)">4</button><button onclick="press(5)">5</button><button onclick="press(6)">6</button>
<button onclick="press(7)">7</button><button onclick="press(8)">8</button><button onclick="press(9)">9</button>
<button onclick="clearPass()">C</button><button onclick="press(0)">0</button>
<button onclick="checkPass()">✔</button>
</div>
</div>
</div>

<!-- (⚠️ बाकी HTML SAME — envelope, letter, cake etc. — unchanged) -->

<script>

/* 🎵 UPDATED MUSIC SYSTEM */
let bg;
let started = false;

window.addEventListener("load",()=>{
bg = document.getElementById("bgMusic");

/* सिर्फ time restore (auto play नहीं) */
let t = localStorage.getItem("bgTime") || 0;
bg.currentTime = t;
});

/* SAVE TIME */
setInterval(()=>{
if(bg) localStorage.setItem("bgTime", bg.currentTime);
},1000);

/* START ONLY ON UNLOCK */
function startBG(){
if(!started){
started = true;

let t = localStorage.getItem("bgTime") || 0;
bg.currentTime = t;

bg.play().catch(()=>{});
}
}

/* PAUSE */
function pauseBG(){
localStorage.setItem("bgTime", bg.currentTime);
bg.pause();
}

/* NAV (UNCHANGED) */
function goTo(n){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById("p"+n).classList.add("active");

if(n===2) startTyping();
if(n===3) startBalloons();
}

/* PASSWORD (ONLY CHANGE HERE 🔥) */
let input="";
function press(n){input+=n;display.innerText=input;}
function clearPass(){input="";display.innerText="";}
function checkPass(){
if(input==="81206"){

startBG(); // 🔥 MUSIC START HERE

goTo(1);

}else{
alert("Wrong Password");
clearPass();
}
}

/* बाकी functions SAME (typing, balloons, blow etc.) */

function blow(){
pauseBG(); // already correct
document.getElementById("flame").style.display="none";
}

</script>

</body>
</html>
