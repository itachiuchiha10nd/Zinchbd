<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Playfair+Display&display=swap" rel="stylesheet">

<style>

html{scroll-behavior:smooth;}

body{
margin:0;
font-family:sans-serif;

/* 🌸 SAME BACKGROUND */
background:url("assets/bg.jpg") no-repeat center/cover fixed;
}

/* overlay */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:rgba(255,240,245,0.35);
backdrop-filter:blur(2px);
z-index:-1;
}

/* page */
.page{
display:none;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
}
.page.active{display:flex}

/* button */
.btn{
padding:12px 25px;
border:none;
border-radius:30px;
background:#ff6eb4;
color:#fff;
cursor:pointer;
margin-top:20px;
}

/* 💌 ENVELOPE IMAGE */
.envelope-img img{
width:90%;
max-width:400px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
transition:0.6s;
cursor:pointer;
}

/* 📜 LETTER */
.paper{
width:90%;
max-width:400px;
height:520px;
background:url("assets/paper.png") no-repeat center/contain;
display:flex;
align-items:center;
justify-content:center;
}

.text{
width:70%;
font-family:'Playfair Display';
font-size:14px;
line-height:1.6;
color:#5a3e3e;
}

/* 🎴 CARDS */
.card{
background:#fff;
padding:15px;
margin:10px;
border-radius:10px;
cursor:pointer;
width:200px;
}

/* 🎁 GRID */
.grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

</style>
</head>

<body>

<!-- 💌 PAGE 0 -->
<div class="page active" id="p0">
<h2>a love letter 💌</h2>

<div class="envelope-img" onclick="openEnvelope()">
<img src="assets/envelope.png">
</div>

</div>

<!-- 🎉 PAGE 1 -->
<div class="page" id="p1">
<h1>Happy Birthday 💖</h1>
<button class="btn" onclick="goTo(2)">Start</button>
</div>

<!-- 📜 PAGE 2 -->
<div class="page" id="p2">
<div class="paper">
<div class="text">
Happy Birthday 💖<br><br>

You are the most special person 🌸<br><br>

Stay happy always ✨<br><br>

Love you forever 💕
</div>
</div>

<button class="btn" onclick="goTo(3)">Next</button>
</div>

<!-- 🎂 PAGE 3 -->
<div class="page" id="p3">
<h2>Cut the Cake 🎂</h2>
<canvas id="cake" width="200" height="200"></canvas>

<button class="btn" onclick="goTo(5)">Continue</button>
</div>

<!-- 🎴 PAGE 5 -->
<div class="page" id="p5">
<h2>Wishes 💖</h2>

<div class="card">Stay happy always 🌸</div>
<div class="card">You are amazing 💖</div>
<div class="card">Keep smiling ✨</div>

<button class="btn" onclick="goTo(6)">Next</button>
</div>

<!-- 🎁 PAGE 6 -->
<div class="page" id="p6">
<h2>🎁 Gifts 🎁</h2>

<div class="grid">
<div class="card" onclick="alert('Surprise 💖')">Gift 1</div>
<div class="card" onclick="alert('Love you 💕')">Gift 2</div>
<div class="card" onclick="alert('Best wishes 🌸')">Gift 3</div>
<div class="card" onclick="alert('Always with you ❤️')">Gift 4</div>
</div>

</div>

<script>

/* PAGE SWITCH */
function goTo(n){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById("p"+n).classList.add("active");
}

/* ENVELOPE OPEN */
function openEnvelope(){
let img=document.querySelector(".envelope-img img");

img.style.transform="scale(1.2) rotateX(90deg)";
img.style.opacity="0";

setTimeout(()=>goTo(1),700);
}

</script>

</body>
</html>
