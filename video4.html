<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Special 💌</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100vh;
overflow:hidden;
background:#000;

display:flex;
justify-content:center;
align-items:center;
}

/* 🎥 VIDEO BOX (SQUARE CENTER) */
.video-box{
width:85vw;
max-width:500px;
aspect-ratio:1/1;

display:flex;
justify-content:center;
align-items:center;
}

/* VIDEO */
video{
width:100%;
height:100%;
object-fit:cover;
border-radius:20px;
}

/* 💌 LETTER BG */
.letter-bg{
position:fixed;
inset:0;
background:url("assets/final-bg.jpg") center/cover no-repeat;

display:none;
justify-content:center;
align-items:center;
}

/* LETTER */
.letter{
width:80vw;
max-width:400px;
height:300px;

background:#fff;
border-radius:15px;

display:flex;
justify-content:center;
align-items:center;
text-align:center;

padding:20px;

transform:scale(0);
opacity:0;
transition:0.5s;
}

.letter.show{
transform:scale(1);
opacity:1;
}

/* TEXT */
.text{
font-size:20px;
font-weight:bold;
color:#000;
line-height:1.5;
}

/* BACK */
.back{
position:absolute;
top:20px;
left:20px;
padding:8px 16px;
background:#ff6eb4;
color:white;
border:none;
border-radius:20px;
z-index:10;
}
</style>
</head>

<body>

<button class="back" onclick="goBack()">Back</button>

<!-- 🎥 VIDEO BOX -->
<div class="video-box">
<video id="vid" src="assets/video4.mp4" autoplay muted playsinline></video>
</div>

<!-- 💌 LETTER -->
<div class="letter-bg" id="letterBg">
<div class="letter" id="letter">
<div class="text">
You are really special to me 💖<br><br>
I hope you always stay happy 😊<br><br>
Thank you for being in my life 💌
</div>
</div>
</div>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" src="assets/bg.mp3" loop></audio>

<script>

let video=document.getElementById("vid");
let bg=document.getElementById("bgMusic");

/* AUTO PLAY FIX (mobile) */
video.play().catch(()=>{
document.body.addEventListener("click",()=>video.play(),{once:true});
});

/* VIDEO END */
video.onended=()=>{

document.querySelector(".video-box").style.display="none";

/* SHOW BG */
let bgDiv=document.getElementById("letterBg");
bgDiv.style.display="flex";

/* MUSIC RESUME */
let t=localStorage.getItem("time")||0;
bg.currentTime=t;

bg.play().catch(()=>{
document.body.addEventListener("click",()=>bg.play(),{once:true});
});

/* POP LETTER */
setTimeout(()=>{
document.getElementById("letter").classList.add("show");
},300);
};

/* SAVE TIME */
setInterval(()=>{
localStorage.setItem("time", bg.currentTime);
},1000);

/* BACK */
function goBack(){
window.location.href="video.html";
}

</script>

</body>
</html>
