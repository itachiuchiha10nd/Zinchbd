<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Card Book 💌</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url("assets/card-bg.png") center/cover no-repeat;
overflow:hidden;
font-family:sans-serif;
}

/* BACK BUTTON */
.back{
position:absolute;
top:20px;
left:20px;
padding:8px 16px;
background:#ff6eb4;
color:white;
border:none;
border-radius:20px;
cursor:pointer;
z-index:5;
}

/* CARD */
.card-container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:300px;
height:200px;
display:flex;
justify-content:center;
align-items:center;
}

.card-img{
width:90%;
height:85%;
object-fit:contain;
}

/* SWIPE TEXT */
.swipe-text{
position:absolute;
bottom:15px;
left:50%;
transform:translateX(-50%);
font-size:14px;
color:#555;
background:rgba(255,255,255,0.6);
padding:5px 12px;
border-radius:12px;
}
</style>
</head>

<body>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" src="assets/bg.mp3" loop></audio>

<button class="back" onclick="goBack()">Back</button>

<div class="card-container">
<img id="cardPage" class="card-img" src="assets/page1.png">
</div>

<div class="swipe-text">Swipe 👉</div>

<script>

/* 🎵 MUSIC SYSTEM (SAME AS VIDEO) */
let bg = document.getElementById("bgMusic");

window.onload = ()=>{

let t = localStorage.getItem("time") || 0;
bg.currentTime = t;

// autoplay try
bg.play().catch(()=>{
document.body.addEventListener("click", ()=>{
bg.play();
},{once:true});
});

// save time
setInterval(()=>{
localStorage.setItem("time", bg.currentTime);
},1000);

};

/* 📄 PNG PAGES */
const images = [
"assets/page1.png",
"assets/page2.png",
"assets/page3.png",
"assets/page4.png",
"assets/page5.png",
"assets/page6.png"
];

let current = 0;

function showImage(){
document.getElementById("cardPage").src = images[current];
}

/* 👉👈 SWIPE */
let startX=0,endX=0;
const card=document.querySelector(".card-container");

card.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
});

card.addEventListener("touchmove",e=>{
endX=e.touches[0].clientX;
});

card.addEventListener("touchend",()=>{
let diff=startX-endX;

if(diff>50 && current < images.length-1){
current++;
showImage();
}

if(diff<-50 && current > 0){
current--;
showImage();
}
});

/* 🖱️ MOUSE */
card.addEventListener("mousedown",e=>{
startX=e.clientX;
});

card.addEventListener("mouseup",e=>{
let diff=startX-e.clientX;

if(diff>50 && current < images.length-1){
current++;
showImage();
}

if(diff<-50 && current > 0){
current--;
showImage();
}
});

/* 🔙 BACK */
function goBack(){
window.location.href="video.html";
}

</script>

</body>
</html>
