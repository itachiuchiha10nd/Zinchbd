<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Card Stack 💌</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100vh;
overflow:hidden;
background:url("assets/card-bg.png") center/cover no-repeat;
font-family:sans-serif;
}

/* BACK BUTTON */
.back{
position:absolute;
top:20px;
left:20px;
padding:8px 16px;
background:#ff6eb4;
color:white;
border:none;
border-radius:20px;
z-index:10;
}

/* 🎯 CARD AREA (WHITE CARD POSITION) */
.card-area{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);

/* adjust if needed */
width:270px;
height:180px;
}

/* CARD */
.card{
position:absolute;
width:100%;
height:100%;
border-radius:12px;
overflow:hidden;
transition:transform 0.5s cubic-bezier(0.22,1,0.36,1), opacity 0.5s;
}

.card img{
width:100%;
height:100%;
object-fit:contain;
}

/* LEFT SMALL */
.card{
transform:translateX(-50px) scale(0.8);
opacity:0.5;
}

/* CENTER BIG */
.card.active{
transform:translateX(0) scale(1);
opacity:1;
z-index:5;
}

/* RIGHT SMALL */
.card.next{
transform:translateX(50px) scale(0.85);
opacity:0.7;
z-index:4;
}
</style>
</head>

<body>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" src="assets/song.mp3" loop></audio>

<button class="back" onclick="goBack()">Back</button>

<div class="card-area" id="cardArea">

<div class="card"><img src="assets/page1.png"></div>
<div class="card"><img src="assets/page2.png"></div>
<div class="card"><img src="assets/page3.png"></div>
<div class="card"><img src="assets/page4.png"></div>
<div class="card"><img src="assets/page5.png"></div>
<div class="card"><img src="assets/page6.png"></div>

</div>

<script>

/* 🎵 MUSIC SYSTEM (SYNC WITH VIDEO.HTML) */
let bg = document.getElementById("bgMusic");

window.onload = ()=>{
let t = localStorage.getItem("time") || 0;
bg.currentTime = t;

// autoplay
bg.play().catch(()=>{
document.body.addEventListener("click", ()=>{
bg.play();
},{once:true});
});

// save time
setInterval(()=>{
localStorage.setItem("time", bg.currentTime);
},1000);
};

/* CARD SYSTEM */
let cards = document.querySelectorAll(".card");
let index = 0;

function updateCards(){
cards.forEach((card,i)=>{
card.style.transition="0.5s";
card.classList.remove("active","next");

if(i === index){
card.classList.add("active");
}
else if(i === index+1){
card.classList.add("next");
}
});
}

updateCards();

/* 🔥 DRAG SYSTEM */
let startX=0,currentX=0,isDragging=false;
const area=document.getElementById("cardArea");

/* TOUCH */
area.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
isDragging=true;
});

area.addEventListener("touchmove",e=>{
if(!isDragging)return;

currentX=e.touches[0].clientX;
let diff=currentX-startX;

let active=cards[index];
active.style.transition="none";
active.style.transform=`translateX(${diff}px) scale(1)`;
});

area.addEventListener("touchend",()=>{
let diff=currentX-startX;
isDragging=false;

if(diff<-80 && index<cards.length-1) index++;
else if(diff>80 && index>0) index--;

updateCards();
});

/* MOUSE */
area.addEventListener("mousedown",e=>{
startX=e.clientX;
isDragging=true;
});

area.addEventListener("mousemove",e=>{
if(!isDragging)return;

currentX=e.clientX;
let diff=currentX-startX;

let active=cards[index];
active.style.transition="none";
active.style.transform=`translateX(${diff}px) scale(1)`;
});

area.addEventListener("mouseup",()=>{
let diff=currentX-startX;
isDragging=false;

if(diff<-80 && index<cards.length-1) index++;
else if(diff>80 && index>0) index--;

updateCards();
});

/* BACK */
function goBack(){
window.location.href="video.html";
}

</script>

</body>
</html>
