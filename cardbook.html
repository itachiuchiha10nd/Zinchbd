<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Card Wishes 💌</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100vh;
overflow:hidden;
background:url("assets/card-bg.jpg") center/cover no-repeat;
font-family:'Dancing Script', cursive;
}

/* BACK */
.back{
position:absolute;
top:20px;
left:20px;
padding:8px 16px;
background:#ff6eb4;
color:white;
border:none;
border-radius:20px;
z-index:10;
}

/* 🔥 CARD AREA (BIG SIZE + RESPONSIVE) */
.card-area{
position:absolute;
top:52%;
left:50%;

/* 🔥 SCALE RESPONSIVE */
transform:translate(-50%,-50%) scale(calc(min(100vw/1200, 100vh/800)));

/* 🔥 REAL SIZE */
width:1070px;
height:690px;
}

/* CARD */
.card{
position:absolute;
width:100%;
height:100%;
border-radius:25px;
padding:40px;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
font-size:42px;
color:#333;
box-shadow:0 20px 40px rgba(0,0,0,0.25);
transition:transform 0.5s cubic-bezier(0.22,1,0.36,1), opacity 0.5s;
}

/* COLORS */
.card:nth-child(1){background:#ffffff;}
.card:nth-child(2){background:#ffd1dc;}
.card:nth-child(3){background:#d4f8e8;}
.card:nth-child(4){background:#fff4b8;}
.card:nth-child(5){background:#e6ccff;}
.card:nth-child(6){background:#ffe0cc;}

/* LEFT SMALL */
.card{
transform:translateX(-180px) scale(0.75);
opacity:0.5;
}

/* CENTER BIG */
.card.active{
transform:translateX(0) scale(1);
opacity:1;
z-index:5;
}

/* RIGHT SMALL */
.card.next{
transform:translateX(180px) scale(0.8);
opacity:0.7;
z-index:4;
}
</style>
</head>

<body>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" src="assets/bg.mp3" loop></audio>

<button class="back" onclick="goBack()">Back</button>

<div class="card-area" id="cardArea">

<div class="card">Happy Birthday Zinc 🎉💖</div>

<div class="card">
Stay happy always 😄<br>
You deserve everything ✨
</div>

<div class="card">
Thanks for coming into my life 🤝💖
</div>

<div class="card">
Keep smiling forever 😊💫
</div>

<div class="card">
I hope we stay together always 😂💌
</div>

<div class="card">
Enjoy your special day 🎂🎈
</div>

</div>

<script>

/* 🎵 MUSIC */
let bg = document.getElementById("bgMusic");

window.onload = ()=>{
let t = localStorage.getItem("time") || 0;
bg.currentTime = t;

bg.play().catch(()=>{
document.body.addEventListener("click", ()=>bg.play(), {once:true});
});

setInterval(()=>{
localStorage.setItem("time", bg.currentTime);
},1000);
};

/* CARD SYSTEM */
let cards = document.querySelectorAll(".card");
let index = 0;

function updateCards(){
cards.forEach((card,i)=>{
card.style.transition="0.5s";
card.classList.remove("active","next");

if(i === index){
card.classList.add("active");
}
else if(i === index+1){
card.classList.add("next");
}
});
}

updateCards();

/* 🔥 DRAG */
let startX=0,currentX=0,isDragging=false;
const area=document.getElementById("cardArea");

/* TOUCH */
area.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
isDragging=true;
});

area.addEventListener("touchmove",e=>{
if(!isDragging)return;

currentX=e.touches[0].clientX;
let diff=currentX-startX;

let active=cards[index];
active.style.transition="none";
active.style.transform=`translateX(${diff}px) scale(1)`;
});

area.addEventListener("touchend",()=>{
let diff=currentX-startX;
isDragging=false;

if(diff<-150 && index<cards.length-1) index++;
else if(diff>150 && index>0) index--;

updateCards();
});

/* MOUSE */
area.addEventListener("mousedown",e=>{
startX=e.clientX;
isDragging=true;
});

area.addEventListener("mousemove",e=>{
if(!isDragging)return;

currentX=e.clientX;
let diff=currentX-startX;

let active=cards[index];
active.style.transition="none";
active.style.transform=`translateX(${diff}px) scale(1)`;
});

area.addEventListener("mouseup",()=>{
let diff=currentX-startX;
isDragging=false;

if(diff<-150 && index<cards.length-1) index++;
else if(diff>150 && index>0) index--;

updateCards();
});

/* BACK */
function goBack(){
window.location.href="video.html";
}

</script>

</body>
</html>
