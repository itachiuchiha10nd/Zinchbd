<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#000;
}
.video-box{
width:60vw;
max-width:320px;
aspect-ratio:1/1;
}
video{width:100%;height:100%;}
.back{
position:absolute;top:20px;left:20px;
background:#ff6eb4;color:white;padding:8px;border:none;
}
</style>
</head>

<body>

<button class="back" onclick="window.location.href='video.html'">Back</button>

<div class="video-box">
<video id="vid" src="assets/video.mp4" autoplay muted playsinline loop></video>
</div>

<script>
document.body.addEventListener("click",()=>{
let v=document.getElementById("vid");
v.muted=false;
v.play();
});
</script>

</body>
</html>
